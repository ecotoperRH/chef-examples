---
- name: Install Python 3 and required system packages
  ansible.builtin.package:
    name:
      - python3
      - python3-pip
      - python3-venv
      - git
      - postgresql
      - postgresql-contrib
      - libpq-dev
    state: present
- name: Create fastapi service user
  ansible.builtin.user:
    name: fastapi
    system: true
    create_home: false
    shell: /sbin/nologin
- name: Create application directory
  ansible.builtin.file:
    path: /opt/fastapi-tutorial
    state: directory
    owner: fastapi
    group: fastapi
    mode: "0755"
- name: Clone FastAPI tutorial repository
  ansible.builtin.git:
    repo: https://github.com/dibanez/fastapi_tutorial.git
    dest: /opt/fastapi-tutorial
    version: main
    update: true
- name: Create Python virtual environment
  ansible.builtin.command:
    cmd: python3 -m venv /opt/fastapi-tutorial/venv
    creates: /opt/fastapi-tutorial/venv
- name: Install Python dependencies
  ansible.builtin.pip:
    requirements: /opt/fastapi-tutorial/requirements.txt
    virtualenv: /opt/fastapi-tutorial/venv
    state: present
- name: Set ownership of application files
  ansible.builtin.file:
    path: /opt/fastapi-tutorial
    owner: fastapi
    group: fastapi
    recurse: true
    state: directory

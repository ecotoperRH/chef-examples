---
- name: Create environment configuration file
  ansible.builtin.template:
    src: env.j2
    dest: /opt/fastapi-tutorial/.env
    owner: root
    group: root
    mode: "0644"
- name: Create systemd service file
  ansible.builtin.template:
    src: fastapi-tutorial.service.j2
    dest: /etc/systemd/system/fastapi-tutorial.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd
- name: Ensure systemd is reloaded
  ansible.builtin.systemd:
    daemon_reload: true
  when: ansible_service_mgr == 'systemd'
- name: Enable and start FastAPI service
  ansible.builtin.service:
    name: fastapi-tutorial
    state: started
    enabled: true

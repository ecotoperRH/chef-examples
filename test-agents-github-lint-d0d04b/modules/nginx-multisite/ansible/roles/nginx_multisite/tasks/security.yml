---
- name: Configure fail2ban
  ansible.builtin.template:
    src: fail2ban.jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  when: enable_fail2ban | bool
  notify: Restart fail2ban
- name: Ensure fail2ban service is running and enabled
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true
  when: enable_fail2ban | bool
- name: Ensure approved keys directory exists
  ansible.builtin.file:
    path: /opt/allowed_keys
    state: directory
    owner: root
    group: root
    mode: "0755"
- name: Copy organization's approved keys
  ansible.builtin.get_url:
    url: https://github.com/eloycoto.keys
    dest: /opt/allowed_keys/eloycoto.keys
    owner: root
    group: root
    mode: "0644"
- name: Configure firewall - Allow SSH
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
  when: enable_firewall | bool and ansible_os_family == "Debian"
- name: Configure firewall - Allow HTTP
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp
  when: enable_firewall | bool and ansible_os_family == "Debian"
- name: Configure firewall - Allow HTTPS
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp
  when: enable_firewall | bool and ansible_os_family == "Debian"
- name: Configure firewall - Allow additional ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
  loop: "{{ allowed_ports }}"
  when:
    - enable_firewall | bool
    - ansible_os_family == "Debian"
    - item not in ['22', '80', '443']
- name: Enable firewall
  community.general.ufw:
    state: enabled
    policy: deny
  when: enable_firewall | bool and ansible_os_family == "Debian"

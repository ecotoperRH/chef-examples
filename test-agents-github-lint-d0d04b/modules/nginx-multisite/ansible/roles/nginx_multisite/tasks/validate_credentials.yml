---
- name: Validate required variables
  ansible.builtin.assert:
    that:
      - default_server_name is defined
      - default_document_root is defined
    fail_msg: Required variables are not defined
    success_msg: All required variables are defined
- name: Validate SSL configuration when enabled
  ansible.builtin.assert:
    that:
      - cert_file is defined
      - key_file is defined
    fail_msg: SSL is enabled but cert_file or key_file is not defined
    success_msg: SSL configuration is valid
  when: ssl_enabled | bool

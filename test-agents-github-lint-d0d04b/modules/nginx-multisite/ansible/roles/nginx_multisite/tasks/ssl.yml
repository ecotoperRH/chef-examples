---
- name: Ensure SSL directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/ssl/private
    - /etc/ssl/certs
- name: Check if self-signed certificates should be generated
  ansible.builtin.set_fact:
    generate_self_signed: "{{ ssl_enabled | bool and (cert_file == '/etc/ssl/certs/ssl-cert-snakeoil.pem' or key_file == '/etc/ssl/private/ssl-cert-snakeoil.key')
      }}"
- name: Check if certificate file exists
  ansible.builtin.stat:
    path: "{{ cert_file }}"
  register: cert_file_stat
  when: generate_self_signed | bool
- name: Generate self-signed SSL certificate
  ansible.builtin.command: openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout {{ key_file }} -out {{ cert_file }} -subj "/CN={{ default_server_name
    }}/O=Example/C=US"
  args:
    creates: "{{ cert_file }}"
  when: generate_self_signed | bool and (not cert_file_stat.stat.exists | default(true))
  notify: Reload nginx

---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    # Verify Nginx configuration files
    - name: Check if nginx.conf exists
      ansible.builtin.stat:
        path: /tmp/molecule_test/etc/nginx/nginx.conf
      register: nginx_conf

    - name: Assert nginx.conf exists
      ansible.builtin.assert:
        that:
          - nginx_conf.stat.exists
          - nginx_conf.stat.isreg
        fail_msg: "nginx.conf file not found"
        success_msg: "nginx.conf file exists"

    - name: Check if security.conf exists
      ansible.builtin.stat:
        path: /tmp/molecule_test/etc/nginx/conf.d/security.conf
      register: security_conf

    - name: Assert security.conf exists
      ansible.builtin.assert:
        that:
          - security_conf.stat.exists
          - security_conf.stat.isreg
        fail_msg: "security.conf file not found"
        success_msg: "security.conf file exists"

    # Verify site configurations
    - name: Check if site configurations exist
      ansible.builtin.stat:
        path: "/tmp/molecule_test/etc/nginx/sites-available/{{ item }}.cluster.local.conf"
      register: site_configs
      loop:
        - test
        - ci
        - status

    - name: Assert site configurations exist
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.isreg
        fail_msg: "Site configuration for {{ item.item }} not found"
        success_msg: "Site configuration for {{ item.item }} exists"
      loop: "{{ site_configs.results }}"

    # Verify site symlinks
    - name: Check if site symlinks exist
      ansible.builtin.stat:
        path: "/tmp/molecule_test/etc/nginx/sites-enabled/{{ item }}.cluster.local.conf"
      register: site_symlinks
      loop:
        - test
        - ci
        - status

    - name: Assert site symlinks exist
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.islnk
        fail_msg: "Site symlink for {{ item.item }} not found"
        success_msg: "Site symlink for {{ item.item }} exists"
      loop: "{{ site_symlinks.results }}"

    # Verify SSL certificates
    - name: Check if SSL certificates exist
      ansible.builtin.stat:
        path: "/tmp/molecule_test/etc/ssl/certs/{{ item }}.cluster.local.crt"
      register: ssl_certs
      loop:
        - test
        - ci
        - status

    - name: Assert SSL certificates exist
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.isreg
        fail_msg: "SSL certificate for {{ item.item }} not found"
        success_msg: "SSL certificate for {{ item.item }} exists"
      loop: "{{ ssl_certs.results }}"

    # Verify SSL keys
    - name: Check if SSL keys exist
      ansible.builtin.stat:
        path: "/tmp/molecule_test/etc/ssl/private/{{ item }}.cluster.local.key"
      register: ssl_keys
      loop:
        - test
        - ci
        - status

    - name: Assert SSL keys exist
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.isreg
        fail_msg: "SSL key for {{ item.item }} not found"
        success_msg: "SSL key for {{ item.item }} exists"
      loop: "{{ ssl_keys.results }}"

    # Verify document roots and index files
    - name: Check if document roots exist
      ansible.builtin.stat:
        path: "/tmp/molecule_test/opt/server/{{ item }}"
      register: doc_roots
      loop:
        - test
        - ci
        - status

    - name: Assert document roots exist
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.isdir
        fail_msg: "Document root for {{ item.item }} not found"
        success_msg: "Document root for {{ item.item }} exists"
      loop: "{{ doc_roots.results }}"

    - name: Check if index.html files exist
      ansible.builtin.stat:
        path: "/tmp/molecule_test/opt/server/{{ item }}/index.html"
      register: index_files
      loop:
        - test
        - ci
        - status

    - name: Assert index.html files exist
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.isreg
        fail_msg: "index.html for {{ item.item }} not found"
        success_msg: "index.html for {{ item.item }} exists"
      loop: "{{ index_files.results }}"

    # Verify fail2ban configuration
    - name: Check if fail2ban jail.local exists
      ansible.builtin.stat:
        path: /tmp/molecule_test/etc/fail2ban/jail.local
      register: fail2ban_conf

    - name: Assert fail2ban jail.local exists
      ansible.builtin.assert:
        that:
          - fail2ban_conf.stat.exists
          - fail2ban_conf.stat.isreg
        fail_msg: "fail2ban jail.local file not found"
        success_msg: "fail2ban jail.local file exists"

    # Verify sysctl security configuration
    - name: Check if sysctl security configuration exists
      ansible.builtin.stat:
        path: /tmp/molecule_test/etc/sysctl.d/99-security.conf
      register: sysctl_conf

    - name: Assert sysctl security configuration exists
      ansible.builtin.assert:
        that:
          - sysctl_conf.stat.exists
          - sysctl_conf.stat.isreg
        fail_msg: "sysctl security configuration file not found"
        success_msg: "sysctl security configuration file exists"

    # Verify organization's approved keys
    - name: Check if organization's approved keys exist
      ansible.builtin.stat:
        path: /tmp/molecule_test/opt/allowed_keys/eloycoto.keys
      register: approved_keys

    - name: Assert organization's approved keys exist
      ansible.builtin.assert:
        that:
          - approved_keys.stat.exists
          - approved_keys.stat.isreg
        fail_msg: "Organization's approved keys file not found"
        success_msg: "Organization's approved keys file exists"

    # The following checks would normally be performed but can't run in a container
    # They are tagged with molecule-notest so they won't run during molecule testing

    - name: Check if Nginx service is running
      ansible.builtin.service_facts:
      tags: molecule-notest

    - name: Assert Nginx service is running
      ansible.builtin.assert:
        that:
          - "'nginx' in ansible_facts.services"
          - "ansible_facts.services['nginx'].state == 'running'"
        fail_msg: "Nginx service is not running"
        success_msg: "Nginx service is running"
      tags: molecule-notest

    - name: Check if fail2ban service is running
      ansible.builtin.service_facts:
      tags: molecule-notest

    - name: Assert fail2ban service is running
      ansible.builtin.assert:
        that:
          - "'fail2ban' in ansible_facts.services"
          - "ansible_facts.services['fail2ban'].state == 'running'"
        fail_msg: "fail2ban service is not running"
        success_msg: "fail2ban service is running"
      tags: molecule-notest

    - name: Check if HTTP port is listening
      ansible.builtin.wait_for:
        port: 80
        timeout: 1
      ignore_errors: true
      register: http_port
      tags: molecule-notest

    - name: Assert HTTP port is listening
      ansible.builtin.assert:
        that:
          - http_port is succeeded
        fail_msg: "HTTP port 80 is not listening"
        success_msg: "HTTP port 80 is listening"
      tags: molecule-notest

    - name: Check if HTTPS port is listening
      ansible.builtin.wait_for:
        port: 443
        timeout: 1
      ignore_errors: true
      register: https_port
      tags: molecule-notest

    - name: Assert HTTPS port is listening
      ansible.builtin.assert:
        that:
          - https_port is succeeded
        fail_msg: "HTTPS port 443 is not listening"
        success_msg: "HTTPS port 443 is listening"
      tags: molecule-notest
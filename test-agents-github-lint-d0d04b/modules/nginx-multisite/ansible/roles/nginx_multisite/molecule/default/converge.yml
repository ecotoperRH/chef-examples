---
- name: Converge
  hosts: all
  gather_facts: true
  tasks:
    # Create directory structure for testing
    - name: Create base directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /tmp/molecule_test/etc/nginx
        - /tmp/molecule_test/etc/nginx/conf.d
        - /tmp/molecule_test/etc/nginx/sites-available
        - /tmp/molecule_test/etc/nginx/sites-enabled
        - /tmp/molecule_test/etc/ssl/certs
        - /tmp/molecule_test/etc/ssl/private
        - /tmp/molecule_test/etc/fail2ban
        - /tmp/molecule_test/etc/sysctl.d
        - /tmp/molecule_test/opt/server/test
        - /tmp/molecule_test/opt/server/ci
        - /tmp/molecule_test/opt/server/status
        - /tmp/molecule_test/opt/allowed_keys

    # Create mock configuration files
    - name: Create mock nginx.conf
      ansible.builtin.copy:
        content: |
          user www-data;
          worker_processes auto;
          pid /run/nginx.pid;
          include /etc/nginx/modules-enabled/*.conf;
          
          events {
            worker_connections 768;
          }
          
          http {
            include /etc/nginx/mime.types;
            default_type application/octet-stream;
            access_log /var/log/nginx/access.log;
            error_log /var/log/nginx/error.log;
            include /etc/nginx/conf.d/*.conf;
            include /etc/nginx/sites-enabled/*;
          }
        dest: /tmp/molecule_test/etc/nginx/nginx.conf
        mode: "0644"

    - name: Create mock security.conf
      ansible.builtin.copy:
        content: |
          # Security settings for Nginx
          server_tokens off;
          add_header X-Frame-Options SAMEORIGIN;
          add_header X-Content-Type-Options nosniff;
          add_header X-XSS-Protection "1; mode=block";
        dest: /tmp/molecule_test/etc/nginx/conf.d/security.conf
        mode: "0644"

    - name: Create mock site configurations
      ansible.builtin.copy:
        content: |
          server {
              listen 80;
              listen [::]:80;
              server_name {{ item }}.cluster.local;
              return 301 https://$host$request_uri;
          }
          
          server {
              listen 443 ssl;
              listen [::]:443 ssl;
              server_name {{ item }}.cluster.local;
              
              ssl_certificate /etc/ssl/certs/{{ item }}.cluster.local.crt;
              ssl_certificate_key /etc/ssl/private/{{ item }}.cluster.local.key;
              
              root /opt/server/{{ item }};
              index index.html;
              
              location / {
                  try_files $uri $uri/ =404;
              }
          }
        dest: "/tmp/molecule_test/etc/nginx/sites-available/{{ item }}.cluster.local.conf"
        mode: "0644"
      loop:
        - test
        - ci
        - status

    - name: Create mock site symlinks
      ansible.builtin.file:
        src: "/tmp/molecule_test/etc/nginx/sites-available/{{ item }}.cluster.local.conf"
        dest: "/tmp/molecule_test/etc/nginx/sites-enabled/{{ item }}.cluster.local.conf"
        state: link
      loop:
        - test
        - ci
        - status

    - name: Create mock SSL certificates
      ansible.builtin.copy:
        content: |
          -----BEGIN CERTIFICATE-----
          MIIDazCCAlOgAwIBAgIUEF5Fjs8hep1KVIJo5jL+Ky0ShZQwDQYJKoZIhvcNAQEL
          BQAwRTELMAkGA1UEBhMCVVMxEzARBgNVBAgMClNvbWUtU3RhdGUxITAfBgNVBAoM
          GEludGVybmV0IFdpZGdpdHMgUHR5IEx0ZDAeFw0yMzA1MTAxMjAwMDBaFw0yNDA1
          MDkxMjAwMDBaMEUxCzAJBgNVBAYTAlVTMRMwEQYDVQQIDApTb21lLVN0YXRlMSEw
          HwYDVQQKDBhJbnRlcm5ldCBXaWRnaXRzIFB0eSBMdGQwggEiMA0GCSqGSIb3DQEB
          AQUAA4IBDwAwggEKAoIBAQC7VJTUt9Us8cKjMzEfXXg2Ezlvby5OvmLndjwcMcC1
          Sample Certificate
          -----END CERTIFICATE-----
        dest: "/tmp/molecule_test/etc/ssl/certs/{{ item }}.cluster.local.crt"
        mode: "0644"
      loop:
        - test
        - ci
        - status

    - name: Create mock SSL keys
      ansible.builtin.copy:
        content: |
          -----BEGIN PRIVATE KEY-----
          MIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQC7VJTUt9Us8cKj
          Sample Private Key
          -----END PRIVATE KEY-----
        dest: "/tmp/molecule_test/etc/ssl/private/{{ item }}.cluster.local.key"
        mode: "0640"
      loop:
        - test
        - ci
        - status

    - name: Create mock index.html files
      ansible.builtin.copy:
        content: |
          <!DOCTYPE html>
          <html>
          <head>
              <title>Welcome to {{ item }}.cluster.local</title>
          </head>
          <body>
              <h1>Welcome to {{ item }}.cluster.local</h1>
              <p>This site is running on Nginx.</p>
          </body>
          </html>
        dest: "/tmp/molecule_test/opt/server/{{ item }}/index.html"
        mode: "0644"
      loop:
        - test
        - ci
        - status

    - name: Create mock fail2ban jail.local
      ansible.builtin.copy:
        content: |
          [DEFAULT]
          bantime = 3600
          findtime = 600
          maxretry = 5
          
          [sshd]
          enabled = true
          port = ssh
          filter = sshd
          logpath = /var/log/auth.log
          maxretry = 3
          
          [nginx-http-auth]
          enabled = true
          filter = nginx-http-auth
          port = http,https
          logpath = /var/log/nginx/error.log
          
          [nginx-limit-req]
          enabled = true
          filter = nginx-limit-req
          port = http,https
          logpath = /var/log/nginx/error.log
          
          [nginx-botsearch]
          enabled = true
          filter = nginx-botsearch
          port = http,https
          logpath = /var/log/nginx/access.log
        dest: /tmp/molecule_test/etc/fail2ban/jail.local
        mode: "0644"

    - name: Create mock sysctl security config
      ansible.builtin.copy:
        content: |
          # IP Spoofing protection
          net.ipv4.conf.all.rp_filter = 1
          net.ipv4.conf.default.rp_filter = 1
          
          # Ignore ICMP broadcast requests
          net.ipv4.icmp_echo_ignore_broadcasts = 1
          
          # Disable source packet routing
          net.ipv4.conf.all.accept_source_route = 0
          net.ipv6.conf.all.accept_source_route = 0
          
          # Ignore send redirects
          net.ipv4.conf.all.send_redirects = 0
          net.ipv4.conf.default.send_redirects = 0
          
          # Block SYN attacks
          net.ipv4.tcp_syncookies = 1
          net.ipv4.tcp_max_syn_backlog = 2048
          net.ipv4.tcp_synack_retries = 2
          net.ipv4.tcp_syn_retries = 5
          
          # Log Martians
          net.ipv4.conf.all.log_martians = 1
          net.ipv4.icmp_ignore_bogus_error_responses = 1
          
          # Ignore ICMP redirects
          net.ipv4.conf.all.accept_redirects = 0
          net.ipv6.conf.all.accept_redirects = 0
        dest: /tmp/molecule_test/etc/sysctl.d/99-security.conf
        mode: "0644"

    - name: Create mock SSH keys file
      ansible.builtin.copy:
        content: |
          ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABgQDEXAMPLEKEYFORTESTINGPURPOSESONLY
          ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEXAMPLEKEYFORTESTINGPURPOSESONLYabc
        dest: /tmp/molecule_test/opt/allowed_keys/eloycoto.keys
        mode: "0644"
name: Ansible CI
true:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: 'python -m pip install --upgrade pip

        pip install ansible ansible-lint yamllint

        '
    - name: Run ansible-lint
      run: ansible-lint ./ansible/roles/nginx_multisite
    - name: Run yamllint
      run: yamllint ./ansible/roles/nginx_multisite
  molecule:
    name: Molecule Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: 'python -m pip install --upgrade pip

        pip install ansible molecule molecule-docker pytest pytest-testinfra docker

        '
    - name: Run Molecule tests
      run: 'cd ./ansible/roles/nginx_multisite

        molecule test

        '
      env:
        PY_COLORS: '1'
        ANSIBLE_FORCE_COLOR: '1'

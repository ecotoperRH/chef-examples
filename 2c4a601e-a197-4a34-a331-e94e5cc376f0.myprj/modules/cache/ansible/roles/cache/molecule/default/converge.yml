- name: Converge
  hosts: all
  gather_facts: true
  tasks:
  - name: Create expected directories
    ansible.builtin.file:
      path: '{{ item }}'
      state: directory
      mode: '0755'
    loop:
    - /tmp/molecule_test/etc
    - /tmp/molecule_test/etc/redis
    - /tmp/molecule_test/var/log/redis
    - /tmp/molecule_test/var/lib/redis
    - /tmp/molecule_test/var/run/memcached
  - name: Create memcached configuration file
    ansible.builtin.copy:
      content: '# memcached default config file

        -d

        logfile /var/log/memcached.log

        -m 64

        -p 11211

        -u memcache

        -g memcache

        -l 127.0.0.1

        -c 1024

        -P /var/run/memcached/memcached.pid

        '
      dest: /tmp/molecule_test/etc/memcached.conf
      mode: '0644'
  - name: Create Redis configuration file
    ansible.builtin.copy:
      content: '# Redis configuration file

        port 6379

        bind 127.0.0.1

        dir /var/lib/redis

        logfile /var/log/redis/redis_6379.log

        requirepass redis_secure_password_123

        # The following lines should be removed by the role

        # replica-serve-stale-data yes

        # replica-read-only yes

        # repl-ping-replica-period 10

        # client-output-buffer-limit normal 0 0 0

        # replica-priority 100

        '
      dest: /tmp/molecule_test/etc/redis/6379.conf
      mode: '0644'
  - name: Create Redis log file
    ansible.builtin.copy:
      content: '# Redis server log file '
      dest: /tmp/molecule_test/var/log/redis/redis_6379.log
      mode: '0644'

---
controller_credential_types:
- name: Redis Authentication
  description: Credential type for Redis Authentication
  kind: cloud
  inputs:
    fields:
    - id: redis_password
      type: string
      label: Redis Password
      secret: true
      help_text: Password used for Redis server authentication
    required:
    - redis_password
  injectors:
    extra_vars:
      redis_password: !unsafe '{{ redis_password }}'
- name: PostgreSQL Database
  description: Credential type for PostgreSQL Database
  kind: cloud
  inputs:
    fields:
    - id: postgres_username
      type: string
      label: PostgreSQL Username
      help_text: Username for PostgreSQL database access
    - id: postgres_password
      type: string
      label: PostgreSQL Password
      secret: true
      help_text: Password for PostgreSQL database access
    required:
    - postgres_username
    - postgres_password
  injectors:
    extra_vars:
      postgres_username: !unsafe '{{ postgres_username }}'
      postgres_password: !unsafe '{{ postgres_password }}'

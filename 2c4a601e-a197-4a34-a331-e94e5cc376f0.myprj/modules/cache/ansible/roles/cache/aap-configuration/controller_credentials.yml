---
controller_credentials:
- name: Redis Authentication - cache
  description: Credential for cache
  organization: Default
  credential_type: Redis Authentication
  update_secrets: true
  inputs:
    redis_password: '{{ vault_redis_password }}'
- name: PostgreSQL Database - cache
  description: Credential for cache
  organization: Default
  credential_type: PostgreSQL Database
  update_secrets: true
  inputs:
    postgres_username: '{{ postgres_username }}'
    postgres_password: '{{ vault_postgres_password }}'

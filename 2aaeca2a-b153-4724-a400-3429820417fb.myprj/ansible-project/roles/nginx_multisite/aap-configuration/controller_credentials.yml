---
controller_credentials:
- name: Redis Password - nginx_multisite
  description: Hardcoded Redis authentication password found in cookbooks/cache/recipes/default.rb
  organization: Default
  credential_type: Redis Password
  update_secrets: true
  inputs:
    redis_password: '{{ vault_redis_password }}'
- name: PostgreSQL FastAPI Credentials - nginx_multisite
  description: Hardcoded PostgreSQL user credentials found in cookbooks/fastapi-tutorial/recipes/default.rb
  organization: Default
  credential_type: PostgreSQL FastAPI Credentials
  update_secrets: true
  inputs:
    postgres_username: '{{ postgres_username }}'
    postgres_password: '{{ vault_postgres_password }}'
    postgres_database: '{{ postgres_database }}'
    postgres_host: '{{ postgres_host }}'

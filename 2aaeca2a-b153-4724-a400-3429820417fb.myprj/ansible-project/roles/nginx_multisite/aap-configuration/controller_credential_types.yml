---
controller_credential_types:
- name: Redis Password
  description: Hardcoded Redis authentication password found in cookbooks/cache/recipes/default.rb
  kind: cloud
  inputs:
    fields:
    - id: redis_password
      type: string
      label: Redis Password
      secret: true
      help_text: Password used for Redis requirepass authentication (originally hardcoded
        as 'redis_secure_password_123' in the cache cookbook)
    required:
    - redis_password
  injectors:
    extra_vars:
      redis_password: !unsafe '{{ redis_password }}'
- name: PostgreSQL FastAPI Credentials
  description: Hardcoded PostgreSQL user credentials found in cookbooks/fastapi-tutorial/recipes/default.rb
  kind: cloud
  inputs:
    fields:
    - id: postgres_username
      type: string
      label: PostgreSQL Username
      help_text: PostgreSQL user provisioned for the FastAPI application (originally
        hardcoded as 'fastapi')
    - id: postgres_password
      type: string
      label: PostgreSQL Password
      secret: true
      help_text: Password for the FastAPI PostgreSQL user (originally hardcoded as
        'fastapi_password' in both the psql provisioning command and the .env file
        DATABASE_URL)
    - id: postgres_database
      type: string
      label: PostgreSQL Database Name
      help_text: Name of the PostgreSQL database created for the FastAPI application
        (originally hardcoded as 'fastapi_db')
    - id: postgres_host
      type: string
      label: PostgreSQL Host
      help_text: Hostname or IP of the PostgreSQL server used in the DATABASE_URL
        (originally 'localhost')
    required:
    - postgres_username
    - postgres_password
    - postgres_database
  injectors:
    extra_vars:
      postgres_username: !unsafe '{{ postgres_username }}'
      postgres_password: !unsafe '{{ postgres_password }}'
      postgres_database: !unsafe '{{ postgres_database }}'
      postgres_host: !unsafe '{{ postgres_host }}'

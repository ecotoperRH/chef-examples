---
controller_credentials:
- name: Redis Authentication Password - cache
  description: Hardcoded Redis requirepass credential from the cache cookbook, to
    be migrated to Ansible Vault
  organization: Default
  credential_type: Redis Authentication Password
  update_secrets: true
  inputs:
    redis_requirepass: '{{ vault_redis_requirepass }}'
- name: FastAPI PostgreSQL Database - cache
  description: Hardcoded PostgreSQL credentials from the fastapi-tutorial cookbook,
    to be migrated to Ansible Vault
  organization: Default
  credential_type: FastAPI PostgreSQL Database
  update_secrets: true
  inputs:
    postgres_fastapi_username: '{{ postgres_fastapi_username }}'
    postgres_fastapi_password: '{{ vault_postgres_fastapi_password }}'
    postgres_fastapi_database: '{{ postgres_fastapi_database }}'
    postgres_fastapi_database_url: '{{ vault_postgres_fastapi_database_url }}'

---
controller_credential_types:
- name: Redis Authentication Password
  description: Hardcoded Redis requirepass credential from the cache cookbook, to
    be migrated to Ansible Vault
  kind: cloud
  inputs:
    fields:
    - id: redis_requirepass
      type: string
      label: Redis Authentication Password
      secret: true
      help_text: Password set as the 'requirepass' directive in /etc/redis/6379.conf.
        Used to authenticate all Redis client connections on port 6379.
    required:
    - redis_requirepass
  injectors:
    extra_vars:
      redis_requirepass: !unsafe '{{ redis_requirepass }}'
- name: FastAPI PostgreSQL Database
  description: Hardcoded PostgreSQL credentials from the fastapi-tutorial cookbook,
    to be migrated to Ansible Vault
  kind: cloud
  inputs:
    fields:
    - id: postgres_fastapi_username
      type: string
      label: PostgreSQL Username
      help_text: 'PostgreSQL user provisioned for the FastAPI application (value:
        ''fastapi'').'
    - id: postgres_fastapi_password
      type: string
      label: PostgreSQL Password
      secret: true
      help_text: Password for the 'fastapi' PostgreSQL user. Appears in the psql provisioning
        command and embedded in the .env file as part of DATABASE_URL.
    - id: postgres_fastapi_database
      type: string
      label: PostgreSQL Database Name
      help_text: 'Name of the PostgreSQL database created for the FastAPI application
        (value: ''fastapi_db'').'
    - id: postgres_fastapi_database_url
      type: string
      label: Database URL
      secret: true
      help_text: Full DATABASE_URL connection string written to /opt/fastapi-tutorial/.env
        (e.g. postgresql://fastapi:fastapi_password@localhost/fastapi_db). Contains
        embedded credentials.
    required:
    - postgres_fastapi_username
    - postgres_fastapi_password
    - postgres_fastapi_database
  injectors:
    extra_vars:
      postgres_fastapi_username: !unsafe '{{ postgres_fastapi_username }}'
      postgres_fastapi_password: !unsafe '{{ postgres_fastapi_password }}'
      postgres_fastapi_database: !unsafe '{{ postgres_fastapi_database }}'
      postgres_fastapi_database_url: !unsafe '{{ postgres_fastapi_database_url }}'

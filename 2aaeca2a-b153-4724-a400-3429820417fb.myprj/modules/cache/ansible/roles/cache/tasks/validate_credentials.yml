---
- name: Validate required credential variables are defined
  ansible.builtin.assert:
    that:
      - redis_requirepass is defined
      - postgres_fastapi_username is defined
      - postgres_fastapi_password is defined
      - postgres_fastapi_database is defined
      - postgres_fastapi_database_url is defined
    fail_msg: One or more required credential variables are not defined. Ensure the AAP credential type is attached to the job template.
    quiet: true

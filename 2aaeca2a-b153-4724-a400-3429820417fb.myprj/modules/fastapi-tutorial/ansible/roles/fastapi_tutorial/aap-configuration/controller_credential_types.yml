---
controller_credential_types:
- name: Redis Hardcoded Password
  description: Redis authentication password hardcoded in the cache cookbook recipe
  kind: cloud
  inputs:
    fields:
    - id: redis_password
      type: string
      label: Redis Password
      secret: true
      help_text: Password used for Redis requirepass authentication, originally hardcoded
        as 'redis_secure_password_123' in cookbooks/cache/recipes/default.rb
    required:
    - redis_password
  injectors:
    extra_vars:
      redis_password: !unsafe '{{ redis_password }}'
- name: FastAPI PostgreSQL Database Credential
  description: PostgreSQL user credentials for the FastAPI application database, hardcoded
    in the fastapi-tutorial cookbook recipe
  kind: cloud
  inputs:
    fields:
    - id: db_username
      type: string
      label: Database Username
      help_text: PostgreSQL role/user name for the FastAPI application, hardcoded
        as 'fastapi' in cookbooks/fastapi-tutorial/recipes/default.rb
    - id: db_password
      type: string
      label: Database Password
      secret: true
      help_text: "PostgreSQL password for the 'fastapi' role, originally hardcoded\
        \ as 'fastapi_password' in cookbooks/fastapi-tutorial/recipes/default.rb \u2014\
        \ appears in both the psql CREATE USER command and the DATABASE_URL in the\
        \ .env file"
    - id: db_name
      type: string
      label: Database Name
      help_text: PostgreSQL database name for the FastAPI application, hardcoded as
        'fastapi_db'
    - id: db_host
      type: string
      label: Database Host
      help_text: PostgreSQL host used in the DATABASE_URL connection string, hardcoded
        as 'localhost'
    - id: database_url
      type: string
      label: Database URL
      secret: true
      help_text: "Full SQLAlchemy/asyncpg connection string written to /opt/fastapi-tutorial/.env,\
        \ e.g. postgresql://fastapi:fastapi_password@localhost/fastapi_db \u2014 contains\
        \ embedded password and must be treated as secret"
    required:
    - db_username
    - db_password
    - db_name
    - db_host
    - database_url
  injectors:
    extra_vars:
      db_username: !unsafe '{{ db_username }}'
      db_password: !unsafe '{{ db_password }}'
      db_name: !unsafe '{{ db_name }}'
      db_host: !unsafe '{{ db_host }}'
      database_url: !unsafe '{{ database_url }}'

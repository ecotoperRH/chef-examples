---
controller_credentials:
- name: Redis Hardcoded Password - fastapi_tutorial
  description: Redis authentication password hardcoded in the cache cookbook recipe
  organization: Default
  credential_type: Redis Hardcoded Password
  update_secrets: true
  inputs:
    redis_password: '{{ vault_redis_password }}'
- name: FastAPI PostgreSQL Database Credential - fastapi_tutorial
  description: PostgreSQL user credentials for the FastAPI application database, hardcoded
    in the fastapi-tutorial cookbook recipe
  organization: Default
  credential_type: FastAPI PostgreSQL Database Credential
  update_secrets: true
  inputs:
    db_username: '{{ db_username }}'
    db_password: '{{ vault_db_password }}'
    db_name: '{{ db_name }}'
    db_host: '{{ db_host }}'
    database_url: '{{ vault_database_url }}'

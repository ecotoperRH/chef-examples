---
- name: Install nginx
  ansible.builtin.package:
    name: nginx
    state: present
- name: Deploy nginx main configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    mode: "0644"
  notify: Reload nginx
- name: Deploy nginx security configuration
  ansible.builtin.template:
    src: security.conf.j2
    dest: /etc/nginx/conf.d/security.conf
    mode: "0644"
  notify: Reload nginx
- name: Enable and start nginx service
  ansible.builtin.service:
    name: nginx
    enabled: true
    state: started
- name: Create document root directories for each site
  ansible.builtin.file:
    path: "{{ item.document_root }}"
    owner: www-data
    group: www-data
    mode: "0755"
    state: directory
  loop: "{{ nginx_sites }}"
- name: Deploy index.html for each site
  ansible.builtin.copy:
    src: "{{ item.name.split('.')[0] }}/index.html"
    dest: "{{ item.document_root }}/index.html"
    owner: www-data
    group: www-data
    mode: "0644"
  loop: "{{ nginx_sites }}"

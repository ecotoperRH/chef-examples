---
- name: Validate PostgreSQL credentials
  ansible.builtin.assert:
    that:
      - postgresql_user is defined
      - postgresql_password is defined
      - postgresql_db_name is defined
    fail_msg: PostgreSQL credentials are not properly defined
    success_msg: PostgreSQL credentials are properly defined
- name: Validate Redis credentials
  ansible.builtin.assert:
    that:
      - redis_password is defined or redis_password is not defined
    fail_msg: Redis password is not properly defined
    success_msg: Redis credentials are properly defined
- name: Validate service user and group
  ansible.builtin.assert:
    that:
      - fastapi_service_user is defined
      - fastapi_service_group is defined
    fail_msg: Service user and group are not properly defined
    success_msg: Service user and group are properly defined

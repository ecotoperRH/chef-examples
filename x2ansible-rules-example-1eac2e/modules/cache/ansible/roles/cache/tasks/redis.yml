---
- name: Ensure Redis group exists
  ansible.builtin.group:
    name: redis
    state: present
  tags:
    - redis
    - configuration
- name: Ensure Redis user exists
  ansible.builtin.user:
    name: redis
    group: redis
    shell: /bin/false
    home: "{{ redis_dir }}"
    system: true
    state: present
  tags:
    - redis
    - configuration
- name: Install Redis packages
  ansible.builtin.package:
    name: redis
    state: present
  tags:
    - redis
    - packages
- name: Create Redis log directory
  ansible.builtin.file:
    path: "{{ redis_log_dir }}"
    state: directory
    owner: redis
    group: redis
    mode: "0755"
  tags:
    - redis
    - configuration
- name: Create Redis data directory
  ansible.builtin.file:
    path: "{{ redis_dir }}"
    state: directory
    owner: redis
    group: redis
    mode: "0755"
  tags:
    - redis
    - configuration
- name: Create Redis PID directory
  ansible.builtin.file:
    path: "{{ redis_base_piddir }}"
    state: directory
    owner: redis
    group: redis
    mode: "0755"
  tags:
    - redis
    - configuration
- name: Create Redis configuration
  ansible.builtin.template:
    src: redis.conf.j2
    dest: "{{ redis_default_settings.config_file }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart redis
  tags:
    - redis
    - configuration
- name: Configure Redis service
  block:
    - name: Create systemd service file
      ansible.builtin.template:
        src: redis.service.j2
        dest: /etc/systemd/system/redis@.service
        owner: root
        group: root
        mode: "0644"
      notify: Restart redis
      when: redis_job_control == 'systemd'
    - name: Create init script
      ansible.builtin.template:
        src: redis.init.j2
        dest: /etc/init.d/redis
        owner: root
        group: root
        mode: "0755"
      notify: Restart redis
      when: redis_job_control != 'systemd'
  tags:
    - redis
    - configuration
- name: Ensure Redis service is enabled and running
  ansible.builtin.service:
    name: "{{ redis_default_settings.service_name }}"
    state: started
    enabled: true
  tags:
    - redis
    - services

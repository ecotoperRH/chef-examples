---
- name: Converge
  hosts: all
  gather_facts: true
  tasks:
    - name: Create expected directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /tmp/molecule_test/etc/redis
        - /tmp/molecule_test/etc/systemd/system
        - /tmp/molecule_test/etc/init.d
        - /tmp/molecule_test/var/lib/redis
        - /tmp/molecule_test/var/log/redis
        - /tmp/molecule_test/var/run/redis
        - /tmp/molecule_test/etc/memcached.conf.d

    - name: Create memcached configuration file
      ansible.builtin.copy:
        content: |
          # memcached default config file
          -d
          logfile /var/log/memcached.log
          -m 64
          -p 11211
          -u memcache
          -l 0.0.0.0
          -c 1024
        dest: /tmp/molecule_test/etc/memcached.conf
        mode: "0644"

    - name: Create Redis configuration file
      ansible.builtin.copy:
        content: |
          # Redis configuration file
          port 6379
          bind 0.0.0.0
          dir /var/lib/redis
          logfile /var/log/redis/redis-server.log
          pidfile /var/run/redis/redis_6379.pid
          requirepass redis_secure_password_123
          maxmemory 64mb
          maxmemory-policy allkeys-lru
          appendonly no
          appendfsync everysec
        dest: /tmp/molecule_test/etc/redis/redis.conf
        mode: "0644"

    - name: Create Redis systemd service file
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=Redis persistent key-value database
          After=network.target

          [Service]
          ExecStart=/usr/bin/redis-server /etc/redis/redis.conf
          Type=simple
          User=redis
          Group=redis
          RuntimeDirectory=redis
          RuntimeDirectoryMode=0755

          [Install]
          WantedBy=multi-user.target
        dest: /tmp/molecule_test/etc/systemd/system/redis@.service
        mode: "0644"

    - name: Create Redis init script
      ansible.builtin.copy:
        content: |
          #!/bin/sh
          ### BEGIN INIT INFO
          # Provides:          redis
          # Required-Start:    $remote_fs $syslog
          # Required-Stop:     $remote_fs $syslog
          # Default-Start:     2 3 4 5
          # Default-Stop:      0 1 6
          # Short-Description: Redis server
          ### END INIT INFO
          
          DAEMON=/usr/bin/redis-server
          DAEMON_ARGS=/etc/redis/redis.conf
          NAME=redis
          DESC=redis
          
          case "$1" in
            start)
              echo "Starting $DESC"
              $DAEMON $DAEMON_ARGS
              ;;
            stop)
              echo "Stopping $DESC"
              kill $(cat /var/run/redis/redis_6379.pid)
              ;;
            restart)
              $0 stop
              $0 start
              ;;
            *)
              echo "Usage: $0 {start|stop|restart}"
              exit 1
              ;;
          esac
          
          exit 0
        dest: /tmp/molecule_test/etc/init.d/redis
        mode: "0755"

    - name: Create Redis log file
      ansible.builtin.copy:
        content: "Redis server started\n"
        dest: /tmp/molecule_test/var/log/redis/redis-server.log
        mode: "0644"

    - name: Create memcached log file
      ansible.builtin.copy:
        content: "Memcached started\n"
        dest: /tmp/molecule_test/var/log/memcached.log
        mode: "0644"
dependency:
  name: galaxy
driver:
  name: docker
platforms:
- name: instance
  image: geerlingguy/docker-ubuntu2004-ansible:latest
  pre_build_image: true
  privileged: true
  command: ''
  volumes:
  - /sys/fs/cgroup:/sys/fs/cgroup:ro
  tmpfs:
  - /tmp
  - /run
  - /run/lock
provisioner:
  name: ansible
  playbooks:
    converge: ${MOLECULE_PLAYBOOK:-converge.yml}
    verify: ${MOLECULE_VERIFY_PLAYBOOK:-verify.yml}
  inventory:
    host_vars:
      instance:
        ansible_user: ansible
verifier:
  name: ansible
scenario:
  test_sequence:
  - lint
  - destroy
  - dependency
  - syntax
  - create
  - prepare
  - converge
  - idempotence
  - verify
  - destroy

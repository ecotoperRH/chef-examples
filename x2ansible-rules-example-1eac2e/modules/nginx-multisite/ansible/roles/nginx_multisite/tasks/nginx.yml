---
- name: Install Nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true
  become: true
- name: Ensure www-data user exists
  ansible.builtin.user:
    name: www-data
    system: true
    state: present
  become: true
- name: Ensure www-data group exists
  ansible.builtin.group:
    name: www-data
    system: true
    state: present
  become: true
- name: Create Nginx configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Reload Nginx
- name: Enable and start Nginx service
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
  become: true

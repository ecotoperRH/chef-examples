---
- name: Ensure Nginx configuration directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/nginx/sites-available
    - /etc/nginx/sites-enabled
    - /etc/nginx/conf.d
  become: true
- name: Create site configurations
  ansible.builtin.template:
    src: site.conf.j2
    dest: /etc/nginx/sites-available/{{ item.key }}
    owner: root
    group: root
    mode: "0644"
  loop: "{{ nginx_sites | dict2items }}"
  become: true
  notify: Reload Nginx
- name: Create document root directories
  ansible.builtin.file:
    path: "{{ item.value.document_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  loop: "{{ nginx_sites | dict2items }}"
  become: true
- name: Copy site content
  ansible.builtin.copy:
    src: "{{ item.key }}/"
    dest: "{{ item.value.document_root }}/"
    owner: www-data
    group: www-data
    mode: "0644"
  loop: "{{ nginx_sites | dict2items }}"
  become: true
- name: Enable sites
  ansible.builtin.file:
    src: /etc/nginx/sites-available/{{ item.key }}
    dest: /etc/nginx/sites-enabled/{{ item.key }}
    state: link
  loop: "{{ nginx_sites | dict2items }}"
  become: true
  notify: Reload Nginx
- name: Remove default site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  become: true
  notify: Reload Nginx

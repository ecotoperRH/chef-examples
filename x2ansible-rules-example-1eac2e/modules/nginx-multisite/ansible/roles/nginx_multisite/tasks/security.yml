---
- name: Install security packages
  ansible.builtin.apt:
    name:
      - fail2ban
      - ufw
    state: present
  become: true
- name: Enable and start fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true
  become: true
  when: security_fail2ban_enabled | bool
- name: Configure fail2ban
  ansible.builtin.template:
    src: fail2ban.jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  become: true
  when: security_fail2ban_enabled | bool
  notify: Restart fail2ban
- name: Set UFW default deny
  ansible.builtin.command:
    cmd: ufw --force default deny
  become: true
  when: security_ufw_enabled | bool
  changed_when: false
  register: ufw_default_deny
- name: Allow SSH through UFW
  ansible.builtin.command:
    cmd: ufw allow ssh
  become: true
  when: security_ufw_enabled | bool
  changed_when: false
  register: ufw_allow_ssh
- name: Allow HTTP through UFW
  ansible.builtin.command:
    cmd: ufw allow http
  become: true
  when: security_ufw_enabled | bool
  changed_when: false
  register: ufw_allow_http
- name: Allow HTTPS through UFW
  ansible.builtin.command:
    cmd: ufw allow https
  become: true
  when: security_ufw_enabled | bool
  changed_when: false
  register: ufw_allow_https
- name: Enable UFW
  ansible.builtin.command:
    cmd: ufw --force enable
  become: true
  when: security_ufw_enabled | bool
  changed_when: false
  register: ufw_enable
- name: Configure sysctl security settings
  ansible.builtin.template:
    src: sysctl-security.conf.j2
    dest: /etc/sysctl.d/99-security.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Reload sysctl
- name: Ensure openssh-server is installed
  ansible.builtin.apt:
    name: openssh-server
    state: present
  become: true
- name: Disable root SSH login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: ^#?PermitRootLogin
    line: PermitRootLogin no
  become: true
  when: security_ssh_disable_root | bool
  notify: Restart SSH
- name: Disable SSH password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: ^#?PasswordAuthentication
    line: PasswordAuthentication no
  become: true
  when: not security_ssh_password_auth | bool
  notify: Restart SSH

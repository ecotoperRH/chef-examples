---
- name: Ensure SSL directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/ssl/certs
    - /etc/ssl/private
  become: true
- name: Generate self-signed SSL certificates
  ansible.builtin.command:
    cmd: 'openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /etc/ssl/private/{{ item.key }}.key -out /etc/ssl/certs/{{ item.key }}.crt -subj "/CN={{ item.key
      }}/O=Example/C=US"

      '
    creates: /etc/ssl/certs/{{ item.key }}.crt
  loop: "{{ nginx_sites | dict2items }}"
  become: true
- name: Set proper permissions on SSL certificates
  ansible.builtin.file:
    path: /etc/ssl/certs/{{ item.key }}.crt
    owner: root
    group: root
    mode: "0644"
  loop: "{{ nginx_sites | dict2items }}"
  become: true
- name: Set proper permissions on SSL private keys
  ansible.builtin.file:
    path: /etc/ssl/private/{{ item.key }}.key
    owner: root
    group: root
    mode: "0600"
  loop: "{{ nginx_sites | dict2items }}"
  become: true

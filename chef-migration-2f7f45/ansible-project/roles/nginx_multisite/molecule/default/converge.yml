---
- name: Converge
  hosts: all
  gather_facts: true
  tasks:
    - name: Create base directories for testing
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /tmp/molecule_test/etc/nginx
        - /tmp/molecule_test/etc/nginx/sites-available
        - /tmp/molecule_test/etc/nginx/sites-enabled
        - /tmp/molecule_test/etc/nginx/conf.d
        - /tmp/molecule_test/etc/ssl/certs
        - /tmp/molecule_test/etc/ssl/private
        - /tmp/molecule_test/etc/fail2ban
        - /tmp/molecule_test/etc/ssh
        - /tmp/molecule_test/etc/sysctl.d
        - /tmp/molecule_test/opt/server/test
        - /tmp/molecule_test/opt/server/ci
        - /tmp/molecule_test/opt/server/status
        - /tmp/molecule_test/var/log/nginx

    - name: Create nginx.conf
      ansible.builtin.copy:
        content: |
          user www-data;
          worker_processes auto;
          pid /run/nginx.pid;
          
          events {
            worker_connections 1024;
            multi_accept on;
          }
          
          http {
            sendfile on;
            tcp_nopush on;
            tcp_nodelay on;
            keepalive_timeout 65;
            types_hash_max_size 2048;
            server_tokens off;
            
            include /etc/nginx/mime.types;
            default_type application/octet-stream;
            
            access_log /var/log/nginx/access.log;
            error_log /var/log/nginx/error.log;
            
            gzip on;
            
            include /etc/nginx/conf.d/*.conf;
            include /etc/nginx/sites-enabled/*;
          }
        dest: /tmp/molecule_test/etc/nginx/nginx.conf
        mode: "0644"

    - name: Create security.conf
      ansible.builtin.copy:
        content: |
          # Security settings
          server_tokens off;
          add_header X-Frame-Options SAMEORIGIN;
          add_header X-Content-Type-Options nosniff;
          add_header X-XSS-Protection "1; mode=block";
          add_header Content-Security-Policy "default-src 'self'";
          
          # SSL settings
          ssl_protocols TLSv1.2 TLSv1.3;
          ssl_prefer_server_ciphers on;
          ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
          ssl_session_timeout 1d;
          ssl_session_cache shared:SSL:10m;
          ssl_session_tickets off;
        dest: /tmp/molecule_test/etc/nginx/conf.d/security.conf
        mode: "0644"

    - name: Create site configurations
      ansible.builtin.copy:
        content: |
          server {
              listen 80;
              server_name {{ item }}.cluster.local;
              root /opt/server/{{ item }};
              index index.html index.htm;
              
              access_log /var/log/nginx/{{ item }}.cluster.local_access.log;
              error_log /var/log/nginx/{{ item }}.cluster.local_error.log;
              
              # Redirect HTTP to HTTPS
              location / {
                  return 301 https://$host$request_uri;
              }
          }
          
          server {
              listen 443 ssl http2;
              server_name {{ item }}.cluster.local;
              root /opt/server/{{ item }};
              index index.html index.htm;
              
              access_log /var/log/nginx/{{ item }}.cluster.local_ssl_access.log;
              error_log /var/log/nginx/{{ item }}.cluster.local_ssl_error.log;
              
              ssl_certificate /etc/ssl/certs/{{ item }}.cluster.local.crt;
              ssl_certificate_key /etc/ssl/private/{{ item }}.cluster.local.key;
              
              location / {
                  try_files $uri $uri/ =404;
              }
              
              # Security headers
              add_header X-Frame-Options "SAMEORIGIN";
              add_header X-XSS-Protection "1; mode=block";
              add_header X-Content-Type-Options "nosniff";
              add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
          }
        dest: "/tmp/molecule_test/etc/nginx/sites-available/{{ item }}.cluster.local"
        mode: "0644"
      loop:
        - test
        - ci
        - status

    - name: Create site symlinks
      ansible.builtin.file:
        src: "/tmp/molecule_test/etc/nginx/sites-available/{{ item }}.cluster.local"
        dest: "/tmp/molecule_test/etc/nginx/sites-enabled/{{ item }}.cluster.local"
        state: link
      loop:
        - test
        - ci
        - status


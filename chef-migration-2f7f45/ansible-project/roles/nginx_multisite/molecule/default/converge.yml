    - name: Create fail2ban jail.local
      ansible.builtin.copy:
        content: |
          [DEFAULT]
          bantime = 3600
          findtime = 600
          maxretry = 3
          
          [sshd]
          enabled = true
          port = ssh
          filter = sshd
          logpath = /var/log/auth.log
          maxretry = 3
          
          [nginx-http-auth]
          enabled = true
          filter = nginx-http-auth
          port = http,https
          logpath = /var/log/nginx/*error.log
          maxretry = 3
        dest: /tmp/molecule_test/etc/fail2ban/jail.local
        mode: "0644"

    - name: Create sshd_config
      ansible.builtin.copy:
        content: |
          PermitRootLogin no
          PasswordAuthentication no
          ChallengeResponseAuthentication no
          UsePAM yes
          X11Forwarding yes
          PrintMotd no
          AcceptEnv LANG LC_*
          Subsystem sftp /usr/lib/openssh/sftp-server
        dest: /tmp/molecule_test/etc/ssh/sshd_config
        mode: "0644"

    - name: Create sysctl security config
      ansible.builtin.copy:
        content: |
          # IP Spoofing protection
          net.ipv4.conf.all.rp_filter = 1
          net.ipv4.conf.default.rp_filter = 1
          
          # Ignore ICMP broadcast requests
          net.ipv4.icmp_echo_ignore_broadcasts = 1
          
          # Disable source packet routing
          net.ipv4.conf.all.accept_source_route = 0
          net.ipv6.conf.all.accept_source_route = 0
          net.ipv4.conf.default.accept_source_route = 0
          net.ipv6.conf.default.accept_source_route = 0
          
          # Ignore send redirects
          net.ipv4.conf.all.send_redirects = 0
          net.ipv4.conf.default.send_redirects = 0
          
          # Block SYN attacks
          net.ipv4.tcp_syncookies = 1
          net.ipv4.tcp_max_syn_backlog = 2048
          net.ipv4.tcp_synack_retries = 2
          net.ipv4.tcp_syn_retries = 5
        dest: /tmp/molecule_test/etc/sysctl.d/99-security.conf
        mode: "0644"

    - name: Create index.html files for each site
      ansible.builtin.copy:
        content: |
          <!DOCTYPE html>
          <html>
          <head>
            <title>{{ item | capitalize }} Site</title>
          </head>
          <body>
            <h1>Welcome to {{ item | capitalize }} Site</h1>
            <p>This is the {{ item }} environment.</p>
          </body>
          </html>
        dest: "/tmp/molecule_test/opt/server/{{ item }}/index.html"
        mode: "0644"
      loop:
        - test
        - ci
        - status
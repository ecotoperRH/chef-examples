---
- name: Create document root directories
  ansible.builtin.file:
    path: "{{ item.document_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  loop: "{{ nginx_sites }}"
  loop_control:
    label: "{{ item.name }}"
- name: Create default index.html for each site
  ansible.builtin.template:
    src: index.html.j2
    dest: "{{ item.document_root }}/index.html"
    owner: www-data
    group: www-data
    mode: "0644"
  loop: "{{ nginx_sites }}"
  loop_control:
    label: "{{ item.name }}"
- name: Configure Nginx sites
  ansible.builtin.template:
    src: site.conf.j2
    dest: /etc/nginx/sites-available/{{ item.name }}
    owner: root
    group: root
    mode: "0644"
    validate: nginx -t -c %s
  loop: "{{ nginx_sites }}"
  loop_control:
    label: "{{ item.name }}"
  notify: Reload nginx
- name: Enable Nginx sites
  ansible.builtin.file:
    src: /etc/nginx/sites-available/{{ item.name }}
    dest: /etc/nginx/sites-enabled/{{ item.name }}
    state: link
    owner: root
    group: root
  loop: "{{ nginx_sites }}"
  loop_control:
    label: "{{ item.name }}"
  notify: Reload nginx
- name: Remove default Nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

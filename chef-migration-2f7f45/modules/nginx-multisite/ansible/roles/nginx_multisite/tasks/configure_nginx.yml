---
- name: Create Nginx snippets directory
  ansible.builtin.file:
    path: /etc/nginx/snippets
    state: directory
    owner: root
    group: root
    mode: "0755"
- name: Copy Nginx main configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  notify: Reload nginx
- name: Copy Nginx security configuration
  ansible.builtin.template:
    src: security.conf.j2
    dest: /etc/nginx/snippets/security.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx
- name: Ensure default site is disabled
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

---
- name: Validate Redis password is set
  ansible.builtin.assert:
    that:
      - redis_password is defined
      - redis_password | length > 0
    fail_msg: Redis password must be set. Please provide it via AAP credential or variable.
    success_msg: Redis password validation successful.
- name: Set Redis configuration variables
  ansible.builtin.set_fact:
    redis_dir: "{{ redis_datadir | default('/var/lib/redis') }}"
    redis_logfile: "{{ redis_logdir | default('/var/log/redis') }}/redis-server.log"
    redis_maxmemory: "{{ redis_memory | default('256mb') }}"

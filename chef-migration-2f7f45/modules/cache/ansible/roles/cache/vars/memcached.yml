---
memcached_package_name: memcached
memcached_service_name: memcached
memcached_user: "{{ 'memcache' if ansible_os_family == 'Debian' else 'memcached' }}"
memcached_group: "{{ 'memcache' if ansible_os_family == 'Debian' else 'memcached' }}"
memcached_config_file: "{{ '/etc/memcached.conf' if ansible_os_family == 'Debian' else '/etc/sysconfig/memcached' }}"
memcached_logfile: /var/log/memcached.log
memcached_max_connections: 1024
memcached_max_memory: 64
memcached_port: 11211
memcached_listen_addr: 127.0.0.1

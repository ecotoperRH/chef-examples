---
memcached_memory: 64
memcached_port: 11211
memcached_listen: 0.0.0.0
memcached_maxconn: 1024
memcached_user: "{{ 'memcache' if ansible_os_family == 'Debian' else 'memcached' }}"
memcached_config_file: "{{ '/etc/memcached.conf' if ansible_os_family == 'Debian' else '/etc/sysconfig/memcached' }}"
redis_port: 6379
redis_maxmemory: 64mb
redis_maxmemory_policy: volatile-lru
redis_databases: 16
redis_appendonly: "no"
redis_dir: /var/lib/redis
redis_logfile: /var/log/redis/redis_6379.log
redis_service_name: "{{ 'redis@6379' if ansible_service_mgr == 'systemd' else 'redis6379' }}"

---
- name: Install memcached package
  ansible.builtin.package:
    name: memcached
    state: present
- name: Create memcached pid directory
  ansible.builtin.file:
    path: /var/run/memcached
    state: directory
    owner: "{{ memcached_user }}"
    group: "{{ memcached_user }}"
    mode: "0755"
- name: Create memcached configuration
  ansible.builtin.template:
    src: memcached.conf.j2
    dest: "{{ memcached_config_file }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart memcached
- name: Ensure memcached service is enabled and running
  ansible.builtin.service:
    name: memcached
    state: started
    enabled: true

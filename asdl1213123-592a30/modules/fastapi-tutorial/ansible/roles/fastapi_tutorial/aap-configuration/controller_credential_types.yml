---
controller_credential_types:
- name: FastAPI PostgreSQL Database
  description: Hardcoded PostgreSQL credentials for the FastAPI application user and
    database connection
  kind: cloud
  inputs:
    fields:
    - id: db_username
      type: string
      label: Database Username
      help_text: PostgreSQL role/user name for the FastAPI application (e.g. 'fastapi')
    - id: db_password
      type: string
      label: Database Password
      secret: true
      help_text: Password for the PostgreSQL 'fastapi' role. Currently hardcoded as
        'fastapi_password' in the recipe. Must be stored in Ansible Vault as 'vault_db_password'.
    - id: db_name
      type: string
      label: Database Name
      help_text: Name of the PostgreSQL database owned by the application user (e.g.
        'fastapi_db')
    - id: db_host
      type: string
      label: Database Host
      help_text: Hostname or IP address of the PostgreSQL server (e.g. 'localhost'
        for single-node topology)
    - id: database_url
      type: string
      label: Database URL
      secret: true
      help_text: Full SQLAlchemy/asyncpg connection string written to /opt/fastapi-tutorial/.env
        as DATABASE_URL. Embeds username and password. Currently hardcoded as 'postgresql://fastapi:fastapi_password@localhost/fastapi_db'.
        Must be templated from vault variables and deployed with mode 0600.
    required:
    - db_username
    - db_password
    - db_name
    - database_url
  injectors:
    extra_vars:
      db_username: !unsafe '{{ db_username }}'
      db_password: !unsafe '{{ db_password }}'
      db_name: !unsafe '{{ db_name }}'
      db_host: !unsafe '{{ db_host }}'
      database_url: !unsafe '{{ database_url }}'

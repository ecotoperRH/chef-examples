---
controller_credential_types:
- name: Ansible Vault Redis Password
  description: Ansible Vault secret for Redis password authentication
  kind: cloud
  inputs:
    fields:
    - id: redis_password
      type: string
      label: Redis Password
      secret: true
      help_text: Password used for Redis requirepass authentication (currently hardcoded
        as 'redis_secure_password_123' in cookbooks/cache/recipes/default.rb)
    required:
    - redis_password
  injectors:
    extra_vars:
      redis_password: !unsafe '{{ redis_password }}'
- name: Ansible Vault PostgreSQL Credentials
  description: Ansible Vault secrets for PostgreSQL database user password and connection
    URL
  kind: cloud
  inputs:
    fields:
    - id: db_password
      type: string
      label: Database Password
      secret: true
      help_text: Password for the PostgreSQL 'fastapi' user (currently hardcoded as
        'fastapi_password' in cookbooks/fastapi-tutorial/recipes/default.rb)
    - id: database_url
      type: string
      label: Database URL
      secret: true
      help_text: Full PostgreSQL connection string written to /opt/fastapi-tutorial/.env
        (e.g., postgresql://fastapi:fastapi_password@localhost/fastapi_db)
    required:
    - db_password
    - database_url
  injectors:
    extra_vars:
      db_password: !unsafe '{{ db_password }}'
      database_url: !unsafe '{{ database_url }}'

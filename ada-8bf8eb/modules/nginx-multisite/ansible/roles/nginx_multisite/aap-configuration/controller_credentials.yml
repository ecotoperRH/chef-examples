---
controller_credentials:
- name: Ansible Vault Redis Password - nginx_multisite
  description: Ansible Vault secret for Redis password authentication
  organization: Default
  credential_type: Ansible Vault Redis Password
  update_secrets: true
  inputs:
    redis_password: '{{ vault_redis_password }}'
- name: Ansible Vault PostgreSQL Credentials - nginx_multisite
  description: Ansible Vault secrets for PostgreSQL database user password and connection
    URL
  organization: Default
  credential_type: Ansible Vault PostgreSQL Credentials
  update_secrets: true
  inputs:
    db_password: '{{ vault_db_password }}'
    database_url: '{{ vault_database_url }}'

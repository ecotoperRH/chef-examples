---
- name: Install SSL packages
  ansible.builtin.package:
    name:
      - openssl
      - ca-certificates
    state: present
- name: Ensure ssl-cert group exists
  ansible.builtin.group:
    name: ssl-cert
    state: present
- name: Ensure SSL certificate directory exists
  ansible.builtin.file:
    path: "{{ nginx_ssl_certificate_path }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
- name: Ensure SSL private key directory exists
  ansible.builtin.file:
    path: "{{ nginx_ssl_private_key_path }}"
    state: directory
    owner: root
    group: ssl-cert
    mode: "0710"
- name: Generate self-signed SSL certificates for each site
  ansible.builtin.shell: "openssl req -x509 -nodes -days 365 -newkey rsa:2048 \\\n  -keyout {{ nginx_ssl_private_key_path }}/{{ item.key }}.key \\\n  -out {{ nginx_ssl_certificate_path
    }}/{{ item.key }}.crt \\\n  -subj \"/C=US/ST=Example/L=Example/O=Example Org/OU=IT/CN={{ item.key }}/emailAddress=admin@example.com\"\nchmod 640 {{ nginx_ssl_private_key_path
    }}/{{ item.key }}.key\nchown root:ssl-cert {{ nginx_ssl_private_key_path }}/{{ item.key }}.key\n"
  args:
    creates: "{{ nginx_ssl_certificate_path }}/{{ item.key }}.crt"
  loop: "{{ nginx_sites | dict2items }}"
  when: item.value.ssl_enabled
  notify: Reload nginx

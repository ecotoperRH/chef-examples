---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    # ================================================================
    # 1. APPLICATION DIRECTORY
    # ================================================================
    - name: Stat application root directory
      ansible.builtin.stat:
        path: /tmp/molecule_test/opt/fastapi-tutorial
      register: app_dir

    - name: Assert application root directory exists and is a directory
      ansible.builtin.assert:
        that:
          - app_dir.stat.exists
          - app_dir.stat.isdir
        fail_msg: "Application directory /opt/fastapi-tutorial is missing"
        success_msg: "Application directory exists"

    # ================================================================
    # 2. GIT REPOSITORY ARTEFACTS (requirements.txt confirms clone)
    # ================================================================
    - name: Stat requirements.txt
      ansible.builtin.stat:
        path: /tmp/molecule_test/opt/fastapi-tutorial/requirements.txt
      register: requirements_file

    - name: Assert requirements.txt exists
      ansible.builtin.assert:
        that:
          - requirements_file.stat.exists
          - requirements_file.stat.size > 0
        fail_msg: "requirements.txt not found — git clone may have failed"
        success_msg: "requirements.txt exists"

    # ================================================================
    # 3. PYTHON VIRTUAL ENVIRONMENT
    # ================================================================
    - name: Stat venv directory
      ansible.builtin.stat:
        path: /tmp/molecule_test/opt/fastapi-tutorial/venv
      register: venv_dir

    - name: Assert venv directory exists
      ansible.builtin.assert:
        that:
          - venv_dir.stat.exists
          - venv_dir.stat.isdir
        fail_msg: "Python virtual environment directory /opt/fastapi-tutorial/venv is missing"
        success_msg: "Virtual environment directory exists"

    - name: Stat venv/bin/pip
      ansible.builtin.stat:
        path: /tmp/molecule_test/opt/fastapi-tutorial/venv/bin/pip
      register: venv_pip

    - name: Assert venv pip binary exists and is executable
      ansible.builtin.assert:
        that:
          - venv_pip.stat.exists
          - venv_pip.stat.executable
        fail_msg: "pip binary not found inside venv — virtual environment may be incomplete"
        success_msg: "venv pip binary exists and is executable"

    - name: Stat venv/bin/uvicorn
      ansible.builtin.stat:
        path: /tmp/molecule_test/opt/fastapi-tutorial/venv/bin/uvicorn
      register: venv_uvicorn

    - name: Assert venv uvicorn binary exists and is executable
      ansible.builtin.assert:
        that:
          - venv_uvicorn.stat.exists
          - venv_uvicorn.stat.executable
        fail_msg: "uvicorn binary not found inside venv — pip install may have failed"
        success_msg: "venv uvicorn binary exists and is executable"

    - name: Stat venv/bin/python
      ansible.builtin.stat:
        path: /tmp/molecule_test/opt/fastapi-tutorial/venv/bin/python
      register: venv_python

    - name: Assert venv python binary exists and is executable
      ansible.builtin.assert:
        that:
          - venv_python.stat.exists
          - venv_python.stat.executable
        fail_msg: "python binary not found inside venv"
        success_msg: "venv python binary exists and is executable"

    # ================================================================
    # 4. .env CONFIGURATION FILE
    # ================================================================
    - name: Stat .env file
      ansible.builtin.stat:
        path: /tmp/molecule_test/opt/fastapi-tutorial/.env
      register: env_file

    - name: Assert .env file exists with correct mode (0640)
      ansible.builtin.assert:
        that:
          - env_file.stat.exists
          - env_file.stat.mode == "0640"
        fail_msg: ".env file missing or has wrong permissions (expected 0640)"
        success_msg: ".env file exists with mode 0640"

    - name: Slurp .env file content
      ansible.builtin.slurp:
        src: /tmp/molecule_test/opt/fastapi-tutorial/.env
      register: env_content

    - name: Assert .env contains required keys
      ansible.builtin.assert:
        that:
          - "'PROJECT_NAME' in (env_content.content | b64decode)"
          - "'API_VERSION' in (env_content.content | b64decode)"
          - "'DATABASE_URL' in (env_content.content | b64decode)"
        fail_msg: ".env file is missing one or more required keys (PROJECT_NAME, API_VERSION, DATABASE_URL)"
        success_msg: ".env file contains all required configuration keys"

    - name: Assert DATABASE_URL points to correct PostgreSQL database
      ansible.builtin.assert:
        that:
          - "'postgresql://' in (env_content.content | b64decode)"
          - "'fastapi_db' in (env_content.content | b64decode)"
        fail_msg: "DATABASE_URL in .env does not reference the expected PostgreSQL database (fastapi_db)"
        success_msg: "DATABASE_URL references the correct PostgreSQL database"

    # ================================================================
    # 5. SYSTEMD UNIT FILE
    # ================================================================
    - name: Stat systemd unit file
      ansible.builtin.stat:
        path: /tmp/molecule_test/etc/systemd/system/fastapi-tutorial.service
      register: service_unit

    - name: Assert systemd unit file exists with correct mode (0644)
      ansible.builtin.assert:
        that:
          - service_unit.stat.exists
          - service_unit.stat.mode == "0644"
        fail_msg: "systemd unit file missing or has wrong permissions (expected 0644)"
        success_msg: "systemd unit file exists with mode 0644"

    - name: Slurp systemd unit file content
      ansible.builtin.slurp:
        src: /tmp/molecule_test/etc/systemd/system/fastapi-tutorial.service
      register: unit_content

    - name: Assert systemd unit file contains required sections
      ansible.builtin.assert:
        that:
          - "'[Unit]' in (unit_content.content | b64decode)"
          - "'[Service]' in (unit_content.content | b64decode)"
          - "'[Install]' in (unit_content.content | b64decode)"
        fail_msg: "systemd unit file is missing one or more required sections ([Unit], [Service], [Install])"
        success_msg: "systemd unit file contains all required sections"

    - name: Assert ExecStart uses uvicorn with correct arguments
      ansible.builtin.assert:
        that:
          - >-
            'ExecStart=/opt/fastapi-tutorial/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000'
            in (unit_content.content | b64decode)
        fail_msg: "ExecStart directive is missing or incorrect in the systemd unit file"
        success_msg: "ExecStart directive is correct"

    - name: Assert After= declares postgresql.service dependency
      ansible.builtin.assert:
        that:
          - "'After=network.target postgresql.service' in (unit_content.content | b64decode)"
        fail_msg: "systemd unit file does not declare 'After=network.target postgresql.service'"
        success_msg: "systemd unit file correctly declares postgresql.service dependency"

    - name: Assert Restart=always is set
      ansible.builtin.assert:
        that:
          - "'Restart=always' in (unit_content.content | b64decode)"
        fail_msg: "Restart=always is not set in the systemd unit file"
        success_msg: "Restart=always is correctly set"

    - name: Assert WorkingDirectory is set to application directory
      ansible.builtin.assert:
        that:
          - "'WorkingDirectory=/opt/fastapi-tutorial' in (unit_content.content | b64decode)"
        fail_msg: "WorkingDirectory is not set to /opt/fastapi-tutorial in the systemd unit file"
        success_msg: "WorkingDirectory is correctly set"

    # ================================================================
    # 6. POSTGRESQL SERVICE (cannot run in container — tagged notest)
    # ================================================================
    - name: Gather service facts
      ansible.builtin.service_facts:
      tags: molecule-notest

    - name: Assert PostgreSQL service is active and enabled
      ansible.builtin.assert:
        that:
          - "'postgresql.service' in ansible_facts.services"
          - ansible_facts.services['postgresql.service'].state == 'running'
          - ansible_facts.services['postgresql.service'].status == 'enabled'
        fail_msg: "PostgreSQL service is not running or not enabled"
        success_msg: "PostgreSQL service is active and enabled"
      tags: molecule-notest

    - name: Check PostgreSQL is listening on port 5432
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 5432
        timeout: 5
        state: started
      tags: molecule-notest

    # ================================================================
    # 7. FASTAPI-TUTORIAL SERVICE (cannot run in container — tagged notest)
    # ================================================================
    - name: Assert fastapi-tutorial service is active and enabled
      ansible.builtin.assert:
        that:
          - "'fastapi-tutorial.service' in ansible_facts.services"
          - ansible_facts.services['fastapi-tutorial.service'].state == 'running'
          - ansible_facts.services['fastapi-tutorial.service'].status == 'enabled'
        fail_msg: "fastapi-tutorial service is not running or not enabled"
        success_msg: "fastapi-tutorial service is active and enabled"
      tags: molecule-notest

    # ================================================================
    # 8. APPLICATION HEALTH CHECK — PORT 8000 (cannot run in container)
    # ================================================================
    - name: Check fastapi-tutorial is listening on port 8000
      ansible.builtin.wait_for:
        host: 0.0.0.0
        port: 8000
        timeout: 10
        state: started
      tags: molecule-notest

    - name: HTTP health check — FastAPI root endpoint
      ansible.builtin.uri:
        url: http://localhost:8000/
        method: GET
        status_code: [200, 404]
        timeout: 10
      tags: molecule-notest

    - name: HTTP health check — FastAPI OpenAPI docs
      ansible.builtin.uri:
        url: http://localhost:8000/docs
        method: GET
        status_code: 200
        timeout: 10
      tags: molecule-notest

    - name: HTTP health check — FastAPI OpenAPI JSON schema
      ansible.builtin.uri:
        url: http://localhost:8000/openapi.json
        method: GET
        status_code: 200
        return_content: true
        timeout: 10
      register: openapi_response
      tags: molecule-notest

    - name: Assert OpenAPI JSON contains required keys
      ansible.builtin.assert:
        that:
          - "'openapi' in openapi_response.json"
          - "'info' in openapi_response.json"
          - "'paths' in openapi_response.json"
        fail_msg: "OpenAPI JSON response is missing required keys (openapi, info, paths)"
        success_msg: "OpenAPI JSON schema is valid"
      tags: molecule-notest

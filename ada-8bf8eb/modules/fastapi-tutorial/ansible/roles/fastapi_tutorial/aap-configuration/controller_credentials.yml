---
controller_credentials:
- name: FastAPI PostgreSQL Database - fastapi_tutorial
  description: Credentials for the FastAPI application's PostgreSQL backend, migrated
    from hardcoded plaintext values in the Chef recipe to Ansible Vault.
  organization: Default
  credential_type: FastAPI PostgreSQL Database
  update_secrets: true
  inputs:
    db_password: '{{ vault_db_password }}'
    database_url: '{{ vault_database_url }}'
    db_user: '{{ db_user }}'
    db_name: '{{ db_name }}'
    db_host: '{{ db_host }}'

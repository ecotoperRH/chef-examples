---
controller_credential_types:
- name: FastAPI PostgreSQL Database
  description: Credentials for the FastAPI application's PostgreSQL backend, migrated
    from hardcoded plaintext values in the Chef recipe to Ansible Vault.
  kind: cloud
  inputs:
    fields:
    - id: db_password
      type: string
      label: Database Password
      secret: true
      help_text: Password for the 'fastapi' PostgreSQL user. Used in CREATE USER and
        DATABASE_URL.
    - id: database_url
      type: string
      label: Database URL
      secret: true
      help_text: Full PostgreSQL connection string written to /opt/fastapi-tutorial/.env
        as DATABASE_URL (e.g. postgresql://fastapi:<password>@localhost/fastapi_db).
    - id: db_user
      type: string
      label: Database Username
      help_text: 'PostgreSQL application username (default: fastapi).'
    - id: db_name
      type: string
      label: Database Name
      help_text: 'PostgreSQL database name (default: fastapi_db).'
    - id: db_host
      type: string
      label: Database Host
      help_text: 'PostgreSQL server hostname or IP (default: localhost).'
    required:
    - db_password
    - database_url
  injectors:
    extra_vars:
      db_password: !unsafe '{{ db_password }}'
      database_url: !unsafe '{{ database_url }}'
      db_user: !unsafe '{{ db_user }}'
      db_name: !unsafe '{{ db_name }}'
      db_host: !unsafe '{{ db_host }}'

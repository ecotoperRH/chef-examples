---
redis_port: 6379
redis_bind: 127.0.0.1
redis_logfile: /var/log/redis/redis-server.log
redis_log_dir: /var/log/redis
redis_log_dir_owner: redis
redis_log_dir_group: redis
redis_log_dir_mode: "0755"
redis_config_file: /etc/redis/6379.conf
redis_service_name: redis-server
redis_deprecated_directives:
  - ^replica-serve-stale-data
  - ^replica-read-only
  - ^repl-ping-replica-period
  - ^client-output-buffer-limit
  - ^replica-priority
memcached_port: 11211
memcached_listen: 127.0.0.1
memcached_memory_limit: 64
memcached_max_connections: 1024
memcached_user: memcache
memcached_service_name: memcached
memcached_packages:
  - memcached
  - libmemcached-tools
redis_packages_debian:
  - redis-server
  - redis-tools
redis_packages_redhat:
  - redis

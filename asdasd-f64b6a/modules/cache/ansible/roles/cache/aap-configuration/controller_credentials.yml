---
controller_credentials:
- name: Redis Authentication Password - cache
  description: Password for Redis server authentication, used as the requirepass directive
    in Redis configuration
  organization: Default
  credential_type: Redis Authentication Password
  update_secrets: true
  inputs:
    redis_password: '{{ vault_redis_password }}'
- name: FastAPI PostgreSQL Database Credentials - cache
  description: PostgreSQL database user credentials for the FastAPI application, including
    the database URL with embedded password
  organization: Default
  credential_type: FastAPI PostgreSQL Database Credentials
  update_secrets: true
  inputs:
    fastapi_db_password: '{{ vault_fastapi_db_password }}'
    fastapi_db_user: '{{ fastapi_db_user }}'
    fastapi_db_name: '{{ fastapi_db_name }}'
    fastapi_db_host: '{{ fastapi_db_host }}'
    database_url: '{{ vault_database_url }}'

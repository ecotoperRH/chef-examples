---
controller_credential_types:
- name: Redis Authentication Password
  description: Password for Redis server authentication, used as the requirepass directive
    in Redis configuration
  kind: cloud
  inputs:
    fields:
    - id: redis_password
      type: string
      label: Redis Password
      secret: true
      help_text: The Redis authentication password set via the requirepass directive
        in /etc/redis/6379.conf. Originally hardcoded as 'redis_secure_password_123'
        in cookbooks/cache/recipes/default.rb. Migrate to Ansible Vault as vault_redis_password.
    required:
    - redis_password
  injectors:
    extra_vars:
      redis_password: !unsafe '{{ redis_password }}'
- name: FastAPI PostgreSQL Database Credentials
  description: PostgreSQL database user credentials for the FastAPI application, including
    the database URL with embedded password
  kind: cloud
  inputs:
    fields:
    - id: fastapi_db_password
      type: string
      label: FastAPI Database Password
      secret: true
      help_text: The PostgreSQL password for the 'fastapi' database user. Originally
        hardcoded as 'fastapi_password' in cookbooks/fastapi-tutorial/recipes/default.rb.
        Migrate to Ansible Vault as vault_fastapi_db_password.
    - id: fastapi_db_user
      type: string
      label: FastAPI Database User
      help_text: The PostgreSQL username for the FastAPI application. Defaults to
        'fastapi'.
    - id: fastapi_db_name
      type: string
      label: FastAPI Database Name
      help_text: The PostgreSQL database name for the FastAPI application. Defaults
        to 'fastapi_db'.
    - id: fastapi_db_host
      type: string
      label: Database Host
      help_text: The PostgreSQL host for the DATABASE_URL connection string. Defaults
        to 'localhost'.
    - id: database_url
      type: string
      label: Database URL
      secret: true
      help_text: Full PostgreSQL connection URL in the format postgresql://user:password@host/dbname.
        Written to /opt/fastapi-tutorial/.env. Originally hardcoded as 'postgresql://fastapi:fastapi_password@localhost/fastapi_db'.
    required:
    - fastapi_db_password
    - fastapi_db_user
    - fastapi_db_name
  injectors:
    extra_vars:
      fastapi_db_password: !unsafe '{{ fastapi_db_password }}'
      fastapi_db_user: !unsafe '{{ fastapi_db_user }}'
      fastapi_db_name: !unsafe '{{ fastapi_db_name }}'
      fastapi_db_host: !unsafe '{{ fastapi_db_host }}'
      database_url: !unsafe '{{ database_url }}'

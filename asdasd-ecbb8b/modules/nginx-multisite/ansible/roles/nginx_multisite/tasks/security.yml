---
- name: Install security packages (fail2ban, ufw)
  ansible.builtin.package:
    name:
      - fail2ban
      - ufw
    state: present
- name: Deploy fail2ban jail configuration
  ansible.builtin.template:
    src: fail2ban.jail.local.j2
    dest: /etc/fail2ban/jail.local
    mode: "0644"
  notify: Restart fail2ban
- name: Enable and start fail2ban service
  ansible.builtin.service:
    name: fail2ban
    enabled: true
    state: started
- name: Set UFW default policy to deny
  ansible.builtin.command:
    cmd: ufw --force default deny
  register: ufw_default_result
  changed_when: "'Default incoming policy changed' in ufw_default_result.stdout"
  failed_when: ufw_default_result.rc != 0
- name: Allow SSH through UFW
  ansible.builtin.command:
    cmd: ufw allow ssh
  register: ufw_ssh_result
  changed_when: "'Rules updated' in ufw_ssh_result.stdout"
  failed_when: ufw_ssh_result.rc != 0
- name: Allow HTTP through UFW
  ansible.builtin.command:
    cmd: ufw allow http
  register: ufw_http_result
  changed_when: "'Rules updated' in ufw_http_result.stdout"
  failed_when: ufw_http_result.rc != 0
- name: Allow HTTPS through UFW
  ansible.builtin.command:
    cmd: ufw allow https
  register: ufw_https_result
  changed_when: "'Rules updated' in ufw_https_result.stdout"
  failed_when: ufw_https_result.rc != 0
- name: Enable UFW firewall
  ansible.builtin.command:
    cmd: ufw --force enable
  register: ufw_enable_result
  changed_when: "'Firewall is active and enabled' in ufw_enable_result.stdout"
  failed_when: ufw_enable_result.rc != 0
- name: Deploy kernel security parameters
  ansible.builtin.template:
    src: sysctl-security.conf.j2
    dest: /etc/sysctl.d/99-security.conf
    mode: "0644"
  notify: Reload sysctl
- name: Disable SSH root login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: ^#?PermitRootLogin
    line: PermitRootLogin no
    state: present
    backup: true
  when: security_ssh_disable_root | bool
  notify: Restart ssh
- name: Disable SSH password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: ^#?PasswordAuthentication
    line: PasswordAuthentication no
    state: present
    backup: true
  when: security_ssh_disable_password_auth | bool
  notify: Restart ssh

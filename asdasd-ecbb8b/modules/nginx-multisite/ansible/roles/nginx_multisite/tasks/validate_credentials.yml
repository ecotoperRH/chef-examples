---
- name: Validate required credentials are defined
  ansible.builtin.assert:
    that:
      - nginx_ssl_cert_country is defined
      - nginx_ssl_cert_org is defined
      - nginx_ssl_cert_email is defined
    fail_msg: "One or more required SSL credential variables are undefined. Ensure nginx_ssl_cert_country, nginx_ssl_cert_org, and nginx_ssl_cert_email are set in
      defaults or an encrypted vault file.\n"
    success_msg: Required credential variables are present.

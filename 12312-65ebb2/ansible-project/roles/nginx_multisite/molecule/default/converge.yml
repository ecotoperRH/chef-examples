    - ci.cluster.local
    - status.cluster.local
  - name: Create symlinks for sites-enabled
    ansible.builtin.file:
      src: /tmp/molecule_test/etc/nginx/sites-available/{{ item }}
      dest: /tmp/molecule_test/etc/nginx/sites-enabled/{{ item }}
      state: link
    loop:
    - test.cluster.local
    - ci.cluster.local
    - status.cluster.local
  - name: Create mock index.html files
    ansible.builtin.copy:
      content: <html><body><h1>{{ item.split('.')[0] | capitalize }} Site</h1></body></html>
      dest: /tmp/molecule_test/opt/server/{{ item.split('.')[0] }}/index.html
      mode: '0644'
    loop:
    - test.cluster.local
    - ci.cluster.local
    - status.cluster.local
  - name: Set credential variables for testing
    ansible.builtin.set_fact:
      redis_password: molecule_test_password
      db_username: molecule_test_user
      db_password: molecule_test_password
      db_connection_string: postgresql://molecule_test_user:molecule_test_password@localhost:5432/testdb

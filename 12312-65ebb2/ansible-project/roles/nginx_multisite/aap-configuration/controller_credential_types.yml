---
controller_credential_types:
- name: Redis Authentication
  description: Credential type for Redis Authentication
  kind: cloud
  inputs:
    fields:
    - id: redis_password
      type: string
      label: Redis Password
      secret: true
      help_text: Password for Redis authentication
    required:
    - redis_password
  injectors:
    extra_vars:
      redis_password: !unsafe '{{ redis_password }}'
- name: PostgreSQL Database
  description: Credential type for PostgreSQL Database
  kind: cloud
  inputs:
    fields:
    - id: db_username
      type: string
      label: Database Username
      help_text: PostgreSQL database username for FastAPI application
    - id: db_password
      type: string
      label: Database Password
      secret: true
      help_text: PostgreSQL database password for FastAPI application
    - id: db_connection_string
      type: string
      label: Database Connection String
      secret: true
      help_text: Full connection string for PostgreSQL database
    required:
    - db_username
    - db_password
  injectors:
    extra_vars:
      db_username: !unsafe '{{ db_username }}'
      db_password: !unsafe '{{ db_password }}'
      db_connection_string: !unsafe '{{ db_connection_string }}'

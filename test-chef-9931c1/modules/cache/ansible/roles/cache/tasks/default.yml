---
- name: Include memcached tasks
  ansible.builtin.include_tasks: memcached.yml
- name: Ensure Redis user exists
  ansible.builtin.user:
    name: redis
    system: true
    shell: /bin/false
    home: /var/lib/redis
    createhome: true
- name: Ensure Redis group exists
  ansible.builtin.group:
    name: redis
    system: true
- name: Create Redis log directory
  ansible.builtin.file:
    path: /var/log/redis
    owner: redis
    group: redis
    mode: "0755"
    state: directory
    recurse: true
- name: Configure Redis cache service
  ansible.builtin.include_role:
    name: eloy.redis.redis
  vars:
    redis_version: "7.2"
    redis_install_method: package
    redis_port: 6379
    redis_requirepass: "{{ redis_password }}"
    redis_maxmemory: 64mb
    redis_bind: 0.0.0.0
    redis_protected_mode: "yes"
    redis_logfile: /var/log/redis/redis_6379.log
    redis_dir: /var/lib/redis
- name: Fix Redis configuration
  ansible.builtin.lineinfile:
    path: /etc/redis/6379.conf
    regexp: "{{ item }}"
    state: absent
  loop:
    - ^replica-serve-stale-data.*$
    - ^replica-read-only.*$
    - ^repl-ping-replica-period.*$
    - ^client-output-buffer-limit.*$
    - ^replica-priority.*$
  notify: restart redis

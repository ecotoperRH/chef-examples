---
- name: Validate Redis password is set when required
  ansible.builtin.assert:
    that:
      - redis_password is defined
      - redis_password | length > 0
    fail_msg: Redis password must be set when using Redis with authentication
    success_msg: Redis password is properly configured
  when: redis_default_settings.requirepass is defined and redis_default_settings.requirepass is not none
  tags:
    - redis
    - redis_config
    - validate

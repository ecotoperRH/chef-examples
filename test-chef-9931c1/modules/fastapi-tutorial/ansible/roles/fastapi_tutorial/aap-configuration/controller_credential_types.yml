---
controller_credential_types:
- name: PostgreSQL Database
  description: Credential type for PostgreSQL Database
  kind: cloud
  inputs:
    fields:
    - id: username
      type: string
      label: Database Username
      help_text: PostgreSQL database username for FastAPI application
    - id: password
      type: string
      label: Database Password
      secret: true
      help_text: PostgreSQL database password for user 'fastapi'
    - id: host
      type: string
      label: Database Host
      help_text: PostgreSQL database hostname
    - id: database_name
      type: string
      label: Database Name
      help_text: PostgreSQL database name
    required:
    - username
    - password
    - host
    - database_name
  injectors:
    extra_vars:
      username: !unsafe '{{ username }}'
      password: !unsafe '{{ password }}'
      host: !unsafe '{{ host }}'
      database_name: !unsafe '{{ database_name }}'

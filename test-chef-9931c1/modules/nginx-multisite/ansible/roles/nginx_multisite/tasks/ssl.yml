---
- name: Ensure SSL directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ nginx_ssl_certificate_path }}"
    - "{{ nginx_ssl_private_key_path }}"
- name: Generate self-signed SSL certificates for sites
  ansible.builtin.command:
    cmd: 'openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout {{ nginx_ssl_private_key_path }}/{{ item.key }}.key -out {{ nginx_ssl_certificate_path }}/{{
      item.key }}.crt -subj "/CN={{ item.key }}/O=Nginx-Multisite/C=US"

      '
    creates: "{{ nginx_ssl_certificate_path }}/{{ item.key }}.crt"
  loop: "{{ nginx_sites | dict2items }}"
  when: item.value.ssl_enabled | default(false) | bool
  notify: Reload nginx

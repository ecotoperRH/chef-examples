- name: Converge
  hosts: all
  gather_facts: true
  tasks:
  - name: Create base directories
    ansible.builtin.file:
      path: '{{ item }}'
      state: directory
      mode: '0755'
    loop:
    - /tmp/molecule_test/etc/nginx
    - /tmp/molecule_test/etc/nginx/sites-available
    - /tmp/molecule_test/etc/nginx/sites-enabled
    - /tmp/molecule_test/etc/nginx/conf.d
    - /tmp/molecule_test/etc/fail2ban
    - /tmp/molecule_test/etc/sysctl.d
    - /tmp/molecule_test/etc/ssh
    - /tmp/molecule_test/etc/ssl/certs
    - /tmp/molecule_test/etc/ssl/private
    - /tmp/molecule_test/opt/server/test
    - /tmp/molecule_test/opt/server/ci
    - /tmp/molecule_test/opt/server/status
  - name: Create mock nginx.conf
    ansible.builtin.copy:
      content: "user www-data;\nworker_processes auto;\npid /run/nginx.pid;\ninclude /etc/nginx/modules-enabled/*.conf;\n\nevents {\n  worker_connections 768;\n}\n\nhttp
        {\n  include /etc/nginx/mime.types;\n  include /etc/nginx/conf.d/*.conf;\n  include /etc/nginx/sites-enabled/*;\n}\n"
      dest: /tmp/molecule_test/etc/nginx/nginx.conf
      mode: '0644'
  - name: Create mock security.conf
    ansible.builtin.copy:
      content: '# Security settings

        server_tokens off;

        add_header X-Frame-Options SAMEORIGIN;

        add_header X-Content-Type-Options nosniff;

        add_header X-XSS-Protection "1; mode=block";

        '
      dest: /tmp/molecule_test/etc/nginx/conf.d/security.conf
      mode: '0644'
  - name: Create mock fail2ban jail.local
    ansible.builtin.copy:
      content: '[DEFAULT]

        bantime = 3600

        findtime = 600

        maxretry = 5


        [sshd]

        enabled = true


        [nginx-http-auth]

        enabled = true

        '
      dest: /tmp/molecule_test/etc/fail2ban/jail.local
      mode: '0644'
  - name: Create mock sysctl security config
    ansible.builtin.copy:
      content: 'net.ipv4.conf.all.rp_filter=1

        net.ipv4.conf.default.rp_filter=1

        net.ipv4.tcp_syncookies=1

        '
      dest: /tmp/molecule_test/etc/sysctl.d/99-security.conf
      mode: '0644'
  - name: Create mock SSH config
    ansible.builtin.copy:
      content: 'PermitRootLogin no

        PasswordAuthentication no

        '
      dest: /tmp/molecule_test/etc/ssh/sshd_config
      mode: '0644'
  - name: Create mock site configurations
    ansible.builtin.copy:
      content: "server {\n  listen 80;\n  server_name {{ item }};\n  return 301 https://$host$request_uri;\n}\n\nserver {\n  listen 443 ssl;\n  server_name {{ item
        }};\n  \n  ssl_certificate /etc/ssl/certs/{{ item }}.crt;\n  ssl_certificate_key /etc/ssl/private/{{ item }}.key;\n  \n  root /opt/server/{{ item.split('.')[0]
        }};\n  index index.html;\n  \n  location / {\n    try_files $uri $uri/ =404;\n  }\n}\n"
      dest: /tmp/molecule_test/etc/nginx/sites-available/{{ item }}.conf
      mode: '0644'
    loop:
    - test.cluster.local
    - ci.cluster.local
    - status.cluster.local
  - name: Create mock site symlinks
    ansible.builtin.file:
      src: /tmp/molecule_test/etc/nginx/sites-available/{{ item }}.conf
      dest: /tmp/molecule_test/etc/nginx/sites-enabled/{{ item }}.conf
      state: link
    loop:
    - test.cluster.local
    - ci.cluster.local
    - status.cluster.local
  - name: Create mock SSL certificates
    ansible.builtin.copy:
      content: MOCK SSL CERTIFICATE FOR {{ item }}
      dest: /tmp/molecule_test/etc/ssl/certs/{{ item }}.crt
      mode: '0644'
    loop:
    - test.cluster.local
    - ci.cluster.local
    - status.cluster.local
  - name: Create mock SSL private keys
    ansible.builtin.copy:
      content: MOCK SSL PRIVATE KEY FOR {{ item }}
      dest: /tmp/molecule_test/etc/ssl/private/{{ item }}.key
      mode: '0644'
    loop:
    - test.cluster.local
    - ci.cluster.local
    - status.cluster.local
  - name: Create mock index.html files
    ansible.builtin.copy:
      content: <html><body><h1>{{ item.split('.')[0] | upper }} Site</h1></body></html>
      dest: /tmp/molecule_test/opt/server/{{ item.split('.')[0] }}/index.html
      mode: '0644'
    loop:
    - test.cluster.local
    - ci.cluster.local
    - status.cluster.local

---
controller_credentials:
- name: FastAPI PostgreSQL Database - fastapi_tutorial
  description: Hardcoded PostgreSQL credentials for the FastAPI application database,
    migrated to AAP credential store
  organization: Default
  credential_type: FastAPI PostgreSQL Database
  update_secrets: true
  inputs:
    db_username: '{{ db_username }}'
    db_password: '{{ vault_db_password }}'
    db_name: '{{ db_name }}'
    db_host: '{{ db_host }}'
    database_url: '{{ vault_database_url }}'
- name: Cache Redis Authentication - fastapi_tutorial
  description: Hardcoded Redis requirepass credential for the Redis 6379 instance,
    migrated to AAP credential store
  organization: Default
  credential_type: Cache Redis Authentication
  update_secrets: true
  inputs:
    redis_requirepass: '{{ vault_redis_requirepass }}'

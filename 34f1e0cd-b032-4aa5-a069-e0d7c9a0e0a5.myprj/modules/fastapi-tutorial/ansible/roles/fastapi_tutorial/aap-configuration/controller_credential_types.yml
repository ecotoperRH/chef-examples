---
controller_credential_types:
- name: FastAPI PostgreSQL Database
  description: Hardcoded PostgreSQL credentials for the FastAPI application database,
    migrated to AAP credential store
  kind: cloud
  inputs:
    fields:
    - id: db_username
      type: string
      label: Database Username
      help_text: PostgreSQL role/user name for the FastAPI application database (e.g.,
        'fastapi')
    - id: db_password
      type: string
      label: Database Password
      secret: true
      help_text: Password for the PostgreSQL 'fastapi' role; previously hardcoded
        as 'fastapi_password' in the recipe. Must be stored as vault_fastapi_db_password
        in Ansible Vault.
    - id: db_name
      type: string
      label: Database Name
      help_text: Name of the PostgreSQL database owned by the FastAPI application
        user (e.g., 'fastapi_db')
    - id: db_host
      type: string
      label: Database Host
      help_text: Hostname or IP address of the PostgreSQL server (e.g., 'localhost')
    - id: database_url
      type: string
      label: Database Connection URL
      secret: true
      help_text: Full PostgreSQL connection string consumed by the FastAPI application
        via the .env file (e.g., postgresql://fastapi:fastapi_password@localhost/fastapi_db).
        Contains embedded credentials and must be treated as a secret.
    required:
    - db_username
    - db_password
    - db_name
    - db_host
    - database_url
  injectors:
    extra_vars:
      db_username: !unsafe '{{ db_username }}'
      db_password: !unsafe '{{ db_password }}'
      db_name: !unsafe '{{ db_name }}'
      db_host: !unsafe '{{ db_host }}'
      database_url: !unsafe '{{ database_url }}'
- name: Cache Redis Authentication
  description: Hardcoded Redis requirepass credential for the Redis 6379 instance,
    migrated to AAP credential store
  kind: cloud
  inputs:
    fields:
    - id: redis_requirepass
      type: string
      label: Redis Password
      secret: true
      help_text: Password set via Redis 'requirepass' directive; previously hardcoded
        as 'redis_secure_password_123' in the cache cookbook recipe. Must be stored
        as vault_redis_requirepass in Ansible Vault and mapped to the geerlingguy.redis
        role variable 'redis_requirepass'.
    required:
    - redis_requirepass
  injectors:
    extra_vars:
      redis_requirepass: !unsafe '{{ redis_requirepass }}'

---
- name: Converge
  hosts: all
  gather_facts: true
  tasks:
    # ------------------------------------------------------------------ #
    # Directories                                                          #
    # ------------------------------------------------------------------ #
    - name: Create expected application directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /tmp/molecule_test/opt/fastapi-tutorial
        - /tmp/molecule_test/opt/fastapi-tutorial/venv
        - /tmp/molecule_test/opt/fastapi-tutorial/venv/bin
        - /tmp/molecule_test/etc/systemd/system

    # ------------------------------------------------------------------ #
    # Simulate cloned git repository artefacts                            #
    # ------------------------------------------------------------------ #
    - name: Create requirements.txt (simulates git-cloned file)
      ansible.builtin.copy:
        content: |
          fastapi>=0.95.0
          uvicorn[standard]>=0.21.0
          psycopg2-binary>=2.9.6
          sqlalchemy>=2.0.0
          python-dotenv>=1.0.0
        dest: /tmp/molecule_test/opt/fastapi-tutorial/requirements.txt
        mode: "0644"

    - name: Create .git directory (simulates cloned repository)
      ansible.builtin.file:
        path: /tmp/molecule_test/opt/fastapi-tutorial/.git
        state: directory
        mode: "0755"

    # ------------------------------------------------------------------ #
    # Simulate virtual-environment executables                            #
    # ------------------------------------------------------------------ #
    - name: Create venv python symlink stub
      ansible.builtin.copy:
        content: "#!/bin/sh\nexec python3 \"$@\"\n"
        dest: /tmp/molecule_test/opt/fastapi-tutorial/venv/bin/python
        mode: "0755"

    - name: Create venv python3 symlink stub
      ansible.builtin.copy:
        content: "#!/bin/sh\nexec python3 \"$@\"\n"
        dest: /tmp/molecule_test/opt/fastapi-tutorial/venv/bin/python3
        mode: "0755"

    - name: Create venv pip stub
      ansible.builtin.copy:
        content: "#!/bin/sh\necho 'pip stub'\n"
        dest: /tmp/molecule_test/opt/fastapi-tutorial/venv/bin/pip
        mode: "0755"

    - name: Create venv uvicorn stub
      ansible.builtin.copy:
        content: "#!/bin/sh\necho 'uvicorn stub'\n"
        dest: /tmp/molecule_test/opt/fastapi-tutorial/venv/bin/uvicorn
        mode: "0755"

    # ------------------------------------------------------------------ #
    # .env configuration file                                             #
    # ------------------------------------------------------------------ #
    - name: Create .env configuration file
      ansible.builtin.copy:
        content: |
          PROJECT_NAME="FastAPI Tutorial"
          API_VERSION=1.0.0
          DATABASE_URL=postgresql://fastapi:fastapi_password@localhost/fastapi_db
        dest: /tmp/molecule_test/opt/fastapi-tutorial/.env
        mode: "0600"

    # ------------------------------------------------------------------ #
    # systemd unit file                                                   #
    # ------------------------------------------------------------------ #
    - name: Create systemd unit file for fastapi-tutorial
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=FastAPI Tutorial Service
          After=network.target postgresql.service

          [Service]
          Type=simple
          User=root
          WorkingDirectory=/opt/fastapi-tutorial
          Environment="PATH=/opt/fastapi-tutorial/venv/bin"
          ExecStart=/opt/fastapi-tutorial/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000
          Restart=always

          [Install]
          WantedBy=multi-user.target
        dest: /tmp/molecule_test/etc/systemd/system/fastapi-tutorial.service
        mode: "0644"

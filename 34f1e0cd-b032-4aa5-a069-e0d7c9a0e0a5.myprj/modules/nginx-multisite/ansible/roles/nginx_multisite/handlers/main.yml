---
- name: Reload nginx
  ansible.builtin.service:
    name: nginx
    state: reloaded
- name: Restart nginx
  ansible.builtin.service:
    name: nginx
    state: restarted
- name: Restart fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: restarted
- name: Restart ssh
  ansible.builtin.service:
    name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"
    state: restarted
- name: Reload sysctl
  ansible.builtin.command:
    cmd: sysctl -p {{ sysctl_security_conf }}
  changed_when: true

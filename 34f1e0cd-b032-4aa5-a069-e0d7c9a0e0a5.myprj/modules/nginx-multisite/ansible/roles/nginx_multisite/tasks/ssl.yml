---
- name: Install SSL packages
  ansible.builtin.package:
    name:
      - openssl
      - ca-certificates
    state: present
- name: Ensure ssl-cert group exists
  ansible.builtin.group:
    name: ssl-cert
    state: present
- name: Ensure SSL certificate directory exists
  ansible.builtin.file:
    path: "{{ nginx_ssl_certificate_path }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
- name: Ensure SSL private key directory exists
  ansible.builtin.file:
    path: "{{ nginx_ssl_private_key_path }}"
    state: directory
    owner: root
    group: ssl-cert
    mode: "0710"
- name: Generate self-signed SSL certificates for SSL-enabled sites
  ansible.builtin.command:
    cmd: 'openssl req -x509 -nodes -days {{ nginx_ssl_cert_days }} -newkey rsa:{{ nginx_ssl_cert_bits }} -keyout {{ nginx_ssl_private_key_path }}/{{ item.key }}.key
      -out {{ nginx_ssl_certificate_path }}/{{ item.key }}.crt -subj "/C={{ nginx_ssl_cert_country }}/ST={{ nginx_ssl_cert_state }}/L={{ nginx_ssl_cert_locality }}/O={{
      nginx_ssl_cert_org }}/OU={{ nginx_ssl_cert_ou }}/CN={{ item.key }}/emailAddress={{ nginx_ssl_cert_email }}"

      '
    creates: "{{ nginx_ssl_certificate_path }}/{{ item.key }}.crt"
  loop: "{{ nginx_sites | dict2items }}"
  when: item.value.ssl_enabled
  notify: Reload nginx
- name: Set correct permissions on private key files
  ansible.builtin.file:
    path: "{{ nginx_ssl_private_key_path }}/{{ item.key }}.key"
    owner: root
    group: ssl-cert
    mode: "0640"
  loop: "{{ nginx_sites | dict2items }}"
  when: item.value.ssl_enabled

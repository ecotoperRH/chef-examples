---
- name: Converge
  hosts: all
  gather_facts: true
  tasks:
    # Create base directories
    - name: Create base directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /tmp/molecule_test/etc/nginx
        - /tmp/molecule_test/etc/nginx/sites-available
        - /tmp/molecule_test/etc/nginx/sites-enabled
        - /tmp/molecule_test/etc/nginx/conf.d
        - /tmp/molecule_test/etc/fail2ban
        - /tmp/molecule_test/etc/sysctl.d
        - /tmp/molecule_test/etc/ssl/certs
        - /tmp/molecule_test/etc/ssl/private
        - /tmp/molecule_test/etc/ssh
        - /tmp/molecule_test/opt/server/test
        - /tmp/molecule_test/opt/server/ci
        - /tmp/molecule_test/opt/server/status
        - /tmp/molecule_test/var/log/nginx

    # Create mock configuration files
    - name: Create nginx.conf
      ansible.builtin.copy:
        content: |
          # Mock nginx.conf for testing
          user www-data;
          worker_processes auto;
          pid /run/nginx.pid;
          events {
            worker_connections 1024;
          }
          http {
            include /etc/nginx/mime.types;
            default_type application/octet-stream;
            access_log /var/log/nginx/access.log;
            error_log /var/log/nginx/error.log;
            include /etc/nginx/conf.d/*.conf;
            include /etc/nginx/sites-enabled/*;
          }
        dest: /tmp/molecule_test/etc/nginx/nginx.conf
        mode: "0644"

    - name: Create security.conf
      ansible.builtin.copy:
        content: |
          # Mock security.conf for testing
          add_header X-Frame-Options "SAMEORIGIN";
          add_header X-Content-Type-Options "nosniff";
          add_header X-XSS-Protection "1; mode=block";
          add_header Content-Security-Policy "default-src 'self'";
          add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        dest: /tmp/molecule_test/etc/nginx/conf.d/security.conf
        mode: "0644"

    - name: Create site configuration files
      ansible.builtin.copy:
        content: |
          # Mock site configuration for {{ item }}
          server {
            listen 80;
            server_name {{ item }};
            return 301 https://$host$request_uri;
          }
          
          server {
            listen 443 ssl;
            server_name {{ item }};
            
            ssl_certificate /etc/ssl/certs/{{ item }}.crt;
            ssl_certificate_key /etc/ssl/private/{{ item }}.key;
            
            root /opt/server/{{ item.split('.')[0] }};
            index index.html;
            
            location / {
              try_files $uri $uri/ =404;
            }
            
            include /etc/nginx/conf.d/security.conf;
          }
        dest: "/tmp/molecule_test/etc/nginx/sites-available/{{ item }}"
        mode: "0644"
      loop:
        - test.cluster.local
        - ci.cluster.local
        - status.cluster.local

    - name: Create site symlinks
      ansible.builtin.file:
        src: "/tmp/molecule_test/etc/nginx/sites-available/{{ item }}"
        dest: "/tmp/molecule_test/etc/nginx/sites-enabled/{{ item }}"
        state: link
      loop:
        - test.cluster.local
        - ci.cluster.local
        - status.cluster.local

    - name: Create mock SSL certificates
      ansible.builtin.copy:
        content: |
          -----BEGIN CERTIFICATE-----
          MIIDazCCAlOgAwIBAgIUJlq+zz4DP9fxgJ5xHjzH2KNB9EgwDQYJKoZIhvcNAQEL
          BQAwRTELMAkGA1UEBhMCVVMxEzARBgNVBAgMClNvbWUtU3RhdGUxITAfBgNVBAoM
          GEludGVybmV0IFdpZGdpdHMgUHR5IEx0ZDAeFw0yMzA1MTAxMjAwMDBaFw0yNDA1
          MDkxMjAwMDBaMEUxCzAJBgNVBAYTAlVTMRMwEQYDVQQIDApTb21lLVN0YXRlMSEw
          HwYDVQQKDBhJbnRlcm5ldCBXaWRnaXRzIFB0eSBMdGQwggEiMA0GCSqGSIb3DQEB
          AQUAA4IBDwAwggEKAoIBAQC7VJTUt9Us8cKjMzEfXXg2Ezlvby5OvmLgdRmQh6MI
          MOCK_CERTIFICATE_DATA_{{ item }}
          -----END CERTIFICATE-----
        dest: "/tmp/molecule_test/etc/ssl/certs/{{ item }}.crt"
        mode: "0644"
      loop:
        - test.cluster.local
        - ci.cluster.local
        - status.cluster.local

    - name: Create mock SSL keys
      ansible.builtin.copy:
        content: |
          -----BEGIN PRIVATE KEY-----
          MIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQC7VJTUt9Us8cKj
          MOCK_PRIVATE_KEY_DATA_{{ item }}
          -----END PRIVATE KEY-----
        dest: "/tmp/molecule_test/etc/ssl/private/{{ item }}.key"
        mode: "0640"
      loop:
        - test.cluster.local
        - ci.cluster.local
        - status.cluster.local

    - name: Create mock index.html files
      ansible.builtin.copy:
        content: |
          <!DOCTYPE html>
          <html>
          <head>
            <title>{{ item.split('.')[0] | capitalize }} Site</title>
          </head>
          <body>
            <h1>Welcome to {{ item.split('.')[0] | capitalize }} Site</h1>
            <p>This is a mock index page for testing.</p>
          </body>
          </html>
        dest: "/tmp/molecule_test/opt/server/{{ item.split('.')[0] }}/index.html"
        mode: "0644"
      loop:
        - test.cluster.local
        - ci.cluster.local
        - status.cluster.local

    - name: Create fail2ban jail.local
      ansible.builtin.copy:
        content: |
          # Mock fail2ban jail.local for testing
          [DEFAULT]
          bantime = 3600
          findtime = 600
          maxretry = 5
          
          [sshd]
          enabled = true
          
          [nginx-http-auth]
          enabled = true
          
          [nginx-limit-req]
          enabled = true
          
          [nginx-botsearch]
          enabled = true
        dest: /tmp/molecule_test/etc/fail2ban/jail.local
        mode: "0644"

    - name: Create sysctl security config
      ansible.builtin.copy:
        content: |
          # Mock sysctl security settings for testing
          net.ipv4.conf.all.rp_filter = 1
          net.ipv4.conf.all.accept_redirects = 0
          net.ipv4.tcp_syncookies = 1
        dest: /tmp/molecule_test/etc/sysctl.d/99-security.conf
        mode: "0644"

    - name: Create mock sshd_config
      ansible.builtin.copy:
        content: |
          # Mock sshd_config for testing
          PermitRootLogin no
          PasswordAuthentication no
        dest: /tmp/molecule_test/etc/ssh/sshd_config
        mode: "0644"
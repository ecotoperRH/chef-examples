---
- name: Create Redis log directory
  ansible.builtin.file:
    path: /var/log/redis
    state: directory
    owner: redis
    group: redis
    mode: "0755"
  register: redis_log_dir
  failed_when: false
- name: Check if Redis configuration file exists
  ansible.builtin.stat:
    path: /etc/redis/6379.conf
  register: redis_conf_file
- name: Fix Redis configuration file
  ansible.builtin.lineinfile:
    path: /etc/redis/6379.conf
    regexp: "{{ item }}"
    state: absent
  loop:
    - ^replica-serve-stale-data.*$
    - ^replica-read-only.*$
    - ^repl-ping-replica-period.*$
    - ^client-output-buffer-limit.*$
    - ^replica-priority.*$
  notify: Restart redis
  when: redis_conf_file.stat.exists

---
- name: Validate required credential variables are defined
  ansible.builtin.assert:
    that:
      - username is defined
      - password is defined
      - database_name is defined
      - host is defined
      - redis_password is defined
    fail_msg: One or more required credential variables are not defined. Ensure the AAP credential type is attached to the job template.
    quiet: true
- name: Validate Redis password is set when Redis is enabled
  ansible.builtin.assert:
    that:
      - redis_password | length > 0
    fail_msg: Redis password must be set when use_redis is true
    quiet: true
  when: use_redis | bool

- name: Verify
  hosts: all
  gather_facts: false
  tasks:
  - name: Check application directory exists
    ansible.builtin.stat:
      path: /tmp/molecule_test/opt/fastapi-tutorial
    register: app_dir
  - name: Assert application directory exists
    ansible.builtin.assert:
      that:
      - app_dir.stat.exists
      - app_dir.stat.isdir
      fail_msg: Application directory not found
      success_msg: Application directory exists
  - name: Check Python virtual environment exists
    ansible.builtin.stat:
      path: /tmp/molecule_test/opt/fastapi-tutorial/venv
    register: venv_dir
  - name: Assert Python virtual environment exists
    ansible.builtin.assert:
      that:
      - venv_dir.stat.exists
      - venv_dir.stat.isdir
      fail_msg: Python virtual environment not found
      success_msg: Python virtual environment exists
  - name: Check environment file exists
    ansible.builtin.stat:
      path: /tmp/molecule_test/opt/fastapi-tutorial/.env
    register: env_file
  - name: Assert environment file exists
    ansible.builtin.assert:
      that:
      - env_file.stat.exists
      fail_msg: Environment file not found
      success_msg: Environment file exists
  - name: Get environment file content
    ansible.builtin.slurp:
      src: /tmp/molecule_test/opt/fastapi-tutorial/.env
    register: env_content
    when: env_file.stat.exists
  - name: Assert environment file has correct content
    ansible.builtin.assert:
      that:
      - env_content.content | b64decode is search('PROJECT_NAME="FastAPI Tutorial"')
      - env_content.content | b64decode is search('API_VERSION=1.0.0')
      - env_content.content | b64decode is search('DATABASE_URL=postgresql://fastapi:fastapi_password@localhost/fastapi_db')
      - env_content.content | b64decode is search('REDIS_HOST=localhost')
      - env_content.content | b64decode is search('REDIS_PORT=6379')
      - env_content.content | b64decode is search('REDIS_PASSWORD=redis_password')
      fail_msg: Environment file content is incorrect
      success_msg: Environment file content is correct
    when: env_file.stat.exists
  - name: Check systemd service file exists
    ansible.builtin.stat:
      path: /tmp/molecule_test/etc/systemd/system/fastapi-tutorial.service
    register: service_file
  - name: Assert systemd service file exists
    ansible.builtin.assert:
      that:
      - service_file.stat.exists
      fail_msg: Systemd service file not found
      success_msg: Systemd service file exists
  - name: Get systemd service file content
    ansible.builtin.slurp:
      src: /tmp/molecule_test/etc/systemd/system/fastapi-tutorial.service
    register: service_content
    when: service_file.stat.exists
  - name: Assert systemd service file has correct content
    ansible.builtin.assert:
      that:
      - service_content.content | b64decode is search('Description=FastAPI Tutorial Service')
      - service_content.content | b64decode is search('ExecStart=/opt/fastapi-tutorial/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000')
      fail_msg: Systemd service file content is incorrect
      success_msg: Systemd service file content is correct
    when: service_file.stat.exists
  - name: Check authorized keys file exists
    ansible.builtin.stat:
      path: /tmp/molecule_test/opt/allowed_keys/eloycoto.keys
    register: keys_file
  - name: Assert authorized keys file exists
    ansible.builtin.assert:
      that:
      - keys_file.stat.exists
      fail_msg: Authorized keys file not found
      success_msg: Authorized keys file exists
  - name: Check app main.py file exists
    ansible.builtin.stat:
      path: /tmp/molecule_test/opt/fastapi-tutorial/app/main.py
    register: main_file
  - name: Assert app main.py file exists
    ansible.builtin.assert:
      that:
      - main_file.stat.exists
      fail_msg: App main.py file not found
      success_msg: App main.py file exists
  - name: Check PostgreSQL service is running
    ansible.builtin.service_facts: null
    tags: molecule-notest
  - name: Assert PostgreSQL service is active
    ansible.builtin.assert:
      that:
      - '''postgresql.service'' in ansible_facts.services'
      - ansible_facts.services['postgresql.service'].state == 'running'
      fail_msg: PostgreSQL service is not running
      success_msg: PostgreSQL service is running
    tags: molecule-notest
  - name: Check FastAPI service is running
    ansible.builtin.service_facts: null
    tags: molecule-notest
  - name: Assert FastAPI service is active
    ansible.builtin.assert:
      that:
      - '''fastapi-tutorial.service'' in ansible_facts.services'
      - ansible_facts.services['fastapi-tutorial.service'].state == 'running'
      fail_msg: FastAPI service is not running
      success_msg: FastAPI service is running
    tags: molecule-notest
  - name: Check FastAPI port is listening
    ansible.builtin.wait_for:
      port: 8000
      state: started
      timeout: 5
    tags: molecule-notest
  - name: Check FastAPI endpoint
    ansible.builtin.uri:
      url: http://localhost:8000/
      return_content: true
    register: api_response
    tags: molecule-notest
  - name: Assert FastAPI endpoint returns correct response
    ansible.builtin.assert:
      that:
      - api_response.status == 200
      - '''Hello'' in api_response.json'
      fail_msg: FastAPI endpoint not responding correctly
      success_msg: FastAPI endpoint responding correctly
    tags: molecule-notest
  - name: Check database connectivity
    ansible.builtin.command:
      cmd: sudo -u postgres psql -c "SELECT 1 FROM pg_database WHERE datname='fastapi_db';"
    register: db_check
    changed_when: false
    failed_when: false
    tags: molecule-notest
  - name: Assert database exists
    ansible.builtin.assert:
      that:
      - db_check.rc == 0
      - '''1 row'' in db_check.stdout'
      fail_msg: Database fastapi_db not found
      success_msg: Database fastapi_db exists
    tags: molecule-notest
  - name: Check Redis service is running
    ansible.builtin.service_facts: null
    tags: molecule-notest
  - name: Assert Redis service is active
    ansible.builtin.assert:
      that:
      - '''redis.service'' in ansible_facts.services'
      - ansible_facts.services['redis.service'].state == 'running'
      fail_msg: Redis service is not running
      success_msg: Redis service is running
    tags: molecule-notest

---
controller_credential_types:
- name: PostgreSQL Database
  description: Credential type for PostgreSQL Database
  kind: cloud
  inputs:
    fields:
    - id: username
      type: string
      label: Database Username
      help_text: PostgreSQL database username for FastAPI application
    - id: password
      type: string
      label: Database Password
      secret: true
      help_text: PostgreSQL database password for FastAPI application
    - id: database_name
      type: string
      label: Database Name
      help_text: PostgreSQL database name for FastAPI application
    - id: host
      type: string
      label: Database Host
      help_text: PostgreSQL database host address
    required:
    - username
    - password
    - database_name
    - host
  injectors:
    extra_vars:
      username: !unsafe '{{ username }}'
      password: !unsafe '{{ password }}'
      database_name: !unsafe '{{ database_name }}'
      host: !unsafe '{{ host }}'
- name: Redis Authentication
  description: Credential type for Redis Authentication
  kind: cloud
  inputs:
    fields:
    - id: redis_password
      type: string
      label: Redis Password
      secret: true
      help_text: Password for Redis authentication
    required:
    - redis_password
  injectors:
    extra_vars:
      redis_password: !unsafe '{{ redis_password }}'

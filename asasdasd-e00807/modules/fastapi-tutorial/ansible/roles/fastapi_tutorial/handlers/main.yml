---
- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
- name: Restart FastAPI service
  ansible.builtin.systemd:
    name: "{{ service_name }}"
    state: restarted
    enabled: true
- name: Restart PostgreSQL
  ansible.builtin.service:
    name: postgresql
    state: restarted

- name: Converge
  hosts: all
  gather_facts: true
  tasks:
  - name: Create memcached directories
    ansible.builtin.file:
      path: '{{ item }}'
      state: directory
      mode: '0755'
    loop:
    - /tmp/molecule_test/etc
    - /tmp/molecule_test/etc/sysconfig
    - /tmp/molecule_test/var/log
  - name: Create memcached config file (Debian style)
    ansible.builtin.copy:
      content: '# Memcached configuration file

        # Generated by Ansible


        # Run memcached as a daemon

        -d


        # Log memcached''s output to /var/log/memcached

        logfile /var/log/memcached.log


        # Start with a cap of 64 megs of memory

        -m 64


        # Default connection port is 11211

        -p 11211


        # Run the daemon as memcache

        -u memcache


        # Specify which IP address to listen on

        -l 127.0.0.1


        # Limit the number of simultaneous incoming connections

        -c 1024

        '
      dest: /tmp/molecule_test/etc/memcached.conf
      mode: '0644'
  - name: Create memcached config file (RedHat style)
    ansible.builtin.copy:
      content: '# RedHat/CentOS configuration

        PORT="11211"

        USER="memcached"

        MAXCONN="1024"

        CACHESIZE="64"

        OPTIONS="-l 127.0.0.1"

        '
      dest: /tmp/molecule_test/etc/sysconfig/memcached
      mode: '0644'
  - name: Create Redis directories
    ansible.builtin.file:
      path: '{{ item }}'
      state: directory
      mode: '0755'
    loop:
    - /tmp/molecule_test/etc/redis
    - /tmp/molecule_test/etc/systemd/system
    - /tmp/molecule_test/var/lib/redis
    - /tmp/molecule_test/var/log/redis
  - name: Create Redis config file
    ansible.builtin.copy:
      content: '# Redis configuration file

        # Generated by Ansible


        port 6379

        daemonize yes

        supervised systemd

        pidfile /var/run/redis/redis-6379.pid

        logfile /var/log/redis/redis-server.log

        dir /var/lib/redis

        requirepass redis_secure_password_123

        databases 16

        maxmemory-policy allkeys-lru

        appendonly yes

        appendfilename "appendonly-6379.aof"

        '
      dest: /tmp/molecule_test/etc/redis/6379.conf
      mode: '0644'
  - name: Create Redis systemd service file
    ansible.builtin.copy:
      content: '[Unit]

        Description=Redis persistent key-value database

        After=network.target


        [Service]

        ExecStart=/usr/bin/redis-server /etc/redis/6379.conf

        ExecStop=/usr/bin/redis-cli -h 127.0.0.1 -p 6379 shutdown

        User=redis

        Group=redis

        RuntimeDirectory=redis

        RuntimeDirectoryMode=0755


        [Install]

        WantedBy=multi-user.target

        '
      dest: /tmp/molecule_test/etc/systemd/system/redis@6379.service
      mode: '0644'
  - name: Create log files
    ansible.builtin.copy:
      content: '# Log file created by molecule test '
      dest: '{{ item }}'
      mode: '0644'
    loop:
    - /tmp/molecule_test/var/log/memcached.log
    - /tmp/molecule_test/var/log/redis/redis-server.log

---
controller_credentials:
- name: Ansible Vault Redis Password - fastapi_tutorial
  description: Redis authentication password hardcoded in the cache cookbook, to be
    migrated to Ansible Vault
  organization: Default
  credential_type: Ansible Vault Redis Password
  update_secrets: true
  inputs:
    redis_password: '{{ vault_redis_password }}'
- name: Ansible Vault PostgreSQL Application Credentials - fastapi_tutorial
  description: PostgreSQL database user credentials hardcoded in the fastapi-tutorial
    cookbook, to be migrated to Ansible Vault
  organization: Default
  credential_type: Ansible Vault PostgreSQL Application Credentials
  update_secrets: true
  inputs:
    postgres_user: '{{ postgres_user }}'
    postgres_password: '{{ vault_postgres_password }}'
    postgres_database: '{{ postgres_database }}'
    database_url: '{{ vault_database_url }}'

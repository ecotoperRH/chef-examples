---
controller_credential_types:
- name: Ansible Vault Redis Password
  description: Redis authentication password hardcoded in the cache cookbook, to be
    migrated to Ansible Vault
  kind: cloud
  inputs:
    fields:
    - id: redis_password
      type: string
      label: Redis Password
      secret: true
      help_text: The requirepass authentication password for Redis on port 6379. Hardcoded
        as 'redis_secure_password_123' in cookbooks/cache/recipes/default.rb. Must
        be stored as vault_redis_password in Ansible Vault.
    required:
    - redis_password
  injectors:
    extra_vars:
      redis_password: !unsafe '{{ redis_password }}'
- name: Ansible Vault PostgreSQL Application Credentials
  description: PostgreSQL database user credentials hardcoded in the fastapi-tutorial
    cookbook, to be migrated to Ansible Vault
  kind: cloud
  inputs:
    fields:
    - id: postgres_user
      type: string
      label: PostgreSQL Username
      help_text: The PostgreSQL application database username. Hardcoded as 'fastapi'
        in cookbooks/fastapi-tutorial/recipes/default.rb. Must be stored as vault_postgres_user
        in Ansible Vault.
    - id: postgres_password
      type: string
      label: PostgreSQL Password
      secret: true
      help_text: 'The PostgreSQL application database user password. Hardcoded as
        ''fastapi_password'' in cookbooks/fastapi-tutorial/recipes/default.rb. Appears
        in 3 places: psql provisioning command, .env file content, and DATABASE_URL.
        Must be stored as vault_postgres_password in Ansible Vault.'
    - id: postgres_database
      type: string
      label: PostgreSQL Database Name
      help_text: The PostgreSQL database name for the FastAPI application. Hardcoded
        as 'fastapi_db'. Used in the DATABASE_URL connection string written to /opt/fastapi-tutorial/.env.
    - id: database_url
      type: string
      label: Database Connection URL
      secret: true
      help_text: "Full PostgreSQL connection string including embedded credentials:\
        \ postgresql://fastapi:fastapi_password@localhost/fastapi_db. Written to /opt/fastapi-tutorial/.env\
        \ (currently mode 0644 \u2014 world-readable, a security concern). Must be\
        \ protected and the .env file permissions tightened to 0600 in Ansible."
    required:
    - postgres_user
    - postgres_password
    - postgres_database
    - database_url
  injectors:
    extra_vars:
      postgres_user: !unsafe '{{ postgres_user }}'
      postgres_password: !unsafe '{{ postgres_password }}'
      postgres_database: !unsafe '{{ postgres_database }}'
      database_url: !unsafe '{{ database_url }}'

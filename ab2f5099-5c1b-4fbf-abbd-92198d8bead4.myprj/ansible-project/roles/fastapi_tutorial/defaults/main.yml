---
fastapi_app_dir: /opt/fastapi-tutorial
fastapi_git_repo: https://github.com/dibanez/fastapi_tutorial.git
fastapi_git_branch: main
fastapi_app_module: app.main:app
fastapi_bind_host: 0.0.0.0
fastapi_port: 8000
fastapi_service_user: root
api_version: 1.0.0
fastapi_db_name: "{{ postgres_database }}"
fastapi_db_user: "{{ postgres_user }}"
fastapi_db_password: "{{ postgres_password }}"
fastapi_db_host: localhost
fastapi_system_packages:
  - python3
  - python3-pip
  - python3-venv
  - git
  - postgresql
  - postgresql-contrib
  - libpq-dev

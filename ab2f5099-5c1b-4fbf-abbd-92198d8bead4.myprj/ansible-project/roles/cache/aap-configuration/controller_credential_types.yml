---
controller_credential_types:
- name: Ansible Vault Redis Authentication
  description: Redis authentication password for the redis@6379 instance, migrated
    from hardcoded Chef recipe attribute to Ansible Vault
  kind: cloud
  inputs:
    fields:
    - id: vault_redis_password
      type: string
      label: Redis Authentication Password
      secret: true
      help_text: Password used as the 'requirepass' directive in /etc/redis/6379.conf.
        Any client connecting to Redis on port 6379 must authenticate with this value.
    required:
    - vault_redis_password
  injectors:
    extra_vars:
      vault_redis_password: !unsafe '{{ vault_redis_password }}'
- name: Ansible Vault PostgreSQL Credentials
  description: PostgreSQL database username and password for the FastAPI application,
    migrated from hardcoded Chef recipe values to Ansible Vault
  kind: cloud
  inputs:
    fields:
    - id: vault_postgres_user
      type: string
      label: PostgreSQL Username
      help_text: PostgreSQL database user for the FastAPI application (e.g., 'fastapi').
        Used in psql provisioning commands and the DATABASE_URL in the .env file.
    - id: vault_postgres_password
      type: string
      label: PostgreSQL Password
      secret: true
      help_text: Password for the PostgreSQL 'fastapi' user. Appears in psql provisioning
        commands, the .env file content, and the DATABASE_URL (postgresql://fastapi:<password>@localhost/fastapi_db).
        Must be stored encrypted.
    required:
    - vault_postgres_user
    - vault_postgres_password
  injectors:
    extra_vars:
      vault_postgres_user: !unsafe '{{ vault_postgres_user }}'
      vault_postgres_password: !unsafe '{{ vault_postgres_password }}'

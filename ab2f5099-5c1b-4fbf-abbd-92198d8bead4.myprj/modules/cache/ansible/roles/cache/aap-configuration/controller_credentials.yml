---
controller_credentials:
- name: Ansible Vault Redis Authentication - cache
  description: Redis authentication password for the redis@6379 instance, migrated
    from hardcoded Chef recipe attribute to Ansible Vault
  organization: Default
  credential_type: Ansible Vault Redis Authentication
  update_secrets: true
  inputs:
    vault_redis_password: '{{ vault_vault_redis_password }}'
- name: Ansible Vault PostgreSQL Credentials - cache
  description: PostgreSQL database username and password for the FastAPI application,
    migrated from hardcoded Chef recipe values to Ansible Vault
  organization: Default
  credential_type: Ansible Vault PostgreSQL Credentials
  update_secrets: true
  inputs:
    vault_postgres_user: '{{ vault_postgres_user }}'
    vault_postgres_password: '{{ vault_vault_postgres_password }}'

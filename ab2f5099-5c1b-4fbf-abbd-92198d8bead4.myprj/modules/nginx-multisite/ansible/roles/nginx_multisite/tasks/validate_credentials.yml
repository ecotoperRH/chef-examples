---
- name: Validate required variables are defined
  ansible.builtin.assert:
    that:
      - nginx_sites is defined
      - nginx_sites | length > 0
      - nginx_ssl_certificate_path is defined
      - nginx_ssl_private_key_path is defined
    fail_msg: Required nginx_multisite variables are not defined. Check defaults/main.yml.
    success_msg: All required variables are defined.

---
controller_credentials:
- name: Redis Authentication - cache
  description: Redis password authentication credential used for client connections
  organization: Default
  credential_type: Redis Authentication
  update_secrets: true
  inputs:
    password: '{{ vault_password }}'
- name: PostgreSQL Database - cache
  description: PostgreSQL database credentials for FastAPI application
  organization: Default
  credential_type: PostgreSQL Database
  update_secrets: true
  inputs:
    username: '{{ username }}'
    password: '{{ vault_password }}'
    host: '{{ host }}'
    port: '{{ port }}'
    database: '{{ database }}'

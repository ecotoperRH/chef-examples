---
controller_credential_types:
- name: Redis Authentication
  description: Redis password authentication credential used for client connections
  kind: cloud
  inputs:
    fields:
    - id: password
      type: string
      label: Redis Password
      secret: true
      help_text: Password used for authenticating to the Redis server
    required:
    - password
  injectors:
    extra_vars:
      password: !unsafe '{{ password }}'
- name: PostgreSQL Database
  description: PostgreSQL database credentials for FastAPI application
  kind: cloud
  inputs:
    fields:
    - id: username
      type: string
      label: Database Username
      help_text: Username for PostgreSQL database authentication
    - id: password
      type: string
      label: Database Password
      secret: true
      help_text: Password for PostgreSQL database authentication
    - id: host
      type: string
      label: Database Host
      help_text: Hostname or IP address of the PostgreSQL server
    - id: port
      type: string
      label: Database Port
      help_text: Port number for the PostgreSQL server connection
    - id: database
      type: string
      label: Database Name
      help_text: Name of the PostgreSQL database to connect to
    required:
    - username
    - password
    - host
    - database
  injectors:
    extra_vars:
      username: !unsafe '{{ username }}'
      password: !unsafe '{{ password }}'
      host: !unsafe '{{ host }}'
      port: !unsafe '{{ port }}'
      database: !unsafe '{{ database }}'

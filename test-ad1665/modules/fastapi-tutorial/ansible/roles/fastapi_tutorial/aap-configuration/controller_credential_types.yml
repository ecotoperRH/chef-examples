---
controller_credential_types:
- name: PostgreSQL Database
  description: Credential type for PostgreSQL Database
  kind: cloud
  inputs:
    fields:
    - id: username
      type: string
      label: Database Username
      help_text: PostgreSQL database username for FastAPI application
    - id: password
      type: string
      label: Database Password
      secret: true
      help_text: PostgreSQL database password for authentication
    - id: database_name
      type: string
      label: Database Name
      help_text: Name of the PostgreSQL database for the FastAPI application
    - id: host
      type: string
      label: Database Host
      help_text: Hostname or IP address of the PostgreSQL server
    required:
    - username
    - password
    - database_name
    - host
  injectors:
    extra_vars:
      username: !unsafe '{{ username }}'
      password: !unsafe '{{ password }}'
      database_name: !unsafe '{{ database_name }}'
      host: !unsafe '{{ host }}'
- name: Redis Cache
  description: Credential type for Redis Cache
  kind: cloud
  inputs:
    fields:
    - id: password
      type: string
      label: Redis Password
      secret: true
      help_text: Authentication password for Redis cache server
    - id: host
      type: string
      label: Redis Host
      help_text: Hostname or IP address of the Redis server
    - id: port
      type: string
      label: Redis Port
      help_text: Port number for the Redis server connection
    required:
    - password
    - host
    - port
  injectors:
    extra_vars:
      password: !unsafe '{{ password }}'
      host: !unsafe '{{ host }}'
      port: !unsafe '{{ port }}'
